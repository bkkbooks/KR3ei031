body:
  text: 卷下第五十一問男女受形之始何以別之答曰男女之合二情交暢陰血先至陽精後沖血開裹精精入為骨而男形成矣陽精先入陰血後滲精開裹血血入居本而女形成矣陽氣聚面故男子面重溺死者必伏陰氣聚背故女子背重溺死者必仰鳥獸溺死者伏背皆然陰陽均至非男非女之身精血散分駢胎品胎之兆父少母老產女必羸母壯父衰生男必弱古之良士也者首察乎此氣受偏疾與之補之補羸女則養血壯脾補弱男則壯脾節色羸女宜及時而嫁弱男宜待壯而婚此疾外所務之本不可不察也第五十二問何以謂之有娠答曰經云經候一月日後覺不通診其脈理平和婦無他疾欲作胎也脈經云有一婦人來診自道經斷不來師言一月為胚二月為始膏三月為居經今既居經正是為作胎也人參丸養陰生血補虛人參鹿角膠熟地川芎白芍當歸白朮各一兩上為細未蜜丸桐子大每服三十丸空心米飲下第五十三問何以謂之居經答曰陽施則別陽者氣也陰化則搏陰者血也二情交暢血氣和調故令有子也經云肝主藏血故一月謂之血凝陰氣方始凝結足厥陰肝經養之肝與膽合二月為之胚兆未成器猶之胚也足少陰膽經養之三月陽神為魂手心主胞經絡養之且經者常也天真之氣與之流通故三旬一見今既三月不行所以謂之居經也白朮散調補衝任扶養胎氣治妊娠宿有風冷胎痿不長或失於調理動傷胎氣多致損墮懷妊常服壯氣益血保護胎藏牡蠣三分白朮四分芎藭四分蜀椒去目及閉口者炒出汗三分上為細末每服二錢溫酒空心調服內補當歸丸熟地酒浸洗九蒸九曬焙乾二兩當歸去蘆洗切焙微炒一兩上為細末蜜丸桐子大每服五十丸溫酒下予嘗觀許學士論枳殼散四物湯內補當歸丸此三方皆載之在人用之何如耳大率妊娠惟在抑陽助陰素問云陰搏陽別為之有子蓋關前為陽關後為陰尺中之脈按之搏手而不絕者妊子也婦人平居陽氣微盛無害及其妊子則方閉經遂以養胎若陽盛搏之則經脈妄行胎乃不固素問所謂陰虛陽搏謂之崩也抑陽助陰之方甚多然胎前藥唯惡群隊若陰陽交雜別生他病惟是枳殼散所以抑陽四物湯所以助陰故爾枳殼散差寒若單服之恐有胎寒腹痛之病以內補丸佐之則陽不致強陰不致弱陰陽調和有益胎嗣此前人未嘗論及也四物湯當歸熟地白芍川芎各等分上㕮咀每服四錢水二盞煎八分去滓溫服不拘時枳殼散枳殼二兩甘草一兩上為細末每服二錢百沸湯點服空心食前三服第五十四問婦人居經之後心中憤悶不欲執作惡聞食氣答曰妊娠心中憤悶頭運四肢煩痛懈墮不欲執作惡聞食氣欲啖鹹酸果實多睡少起者世云惡食又云惡字是也乃至三四月以上大劇者不能自勝舉也此繇婦人元本虛羸血氣不足腎氣又弱兼當風飲冷太過心下有痰水水漬於臟故心煩憤悶氣挾而嘔吐也挾風則頭目運此名惡阻所謂阻者經血既閉痰水積於中阻其臟氣不得宣通也竹茹湯治初有妊擇食嘔逆頭痛顛倒寒熱煩悶陳皮人參白朮麥門冬各一兩甘草炙一錢厚朴茯苓各半兩淡竹茹先刮下臨煎旋入一本有淡竹一錢上㕮咀每服四錢水盞半入姜竹茹各一塊如慄大拍破同煎八分頻服去滓溫服茯苓丸治妊娠阻病心中煩憒頭目眩重惡聞食氣嘔逆吐悶葛根枳殼白朮甘草炙各二兩赤茯苓人參乾薑肉桂陳皮半夏各一兩上為細末蜜丸桐子大每服五十丸溫米飲空心送下小地黃丸治妊娠酸心吐清水腹痛不能飲食人參乾薑炮各等分上為末用生地黃汁丸桐子大每服五十丸食前服半夏茯苓湯治妊娠惡阻心中憤悶頭目眩暈四肢怠惰百節煩疼痰逆嘔吐嫌聞食氣好啖酸鹹多臥少起不進飲食半夏白茯苓熟地酒浸各一兩八錢陳皮細辛人參芍藥川芎紫蘇桔梗甘草以上各一兩二錢上每服四錢水二盞姜七片煎七分空腹服有熱煩渴口生瘡者去陳皮細辛加前胡知母腹冷下痢者去地黃入桂心胃中虛熱大小便秘澀者加大黃一兩八錢去地黃加黃芩四七湯治同前方見二十八問中二陳湯治妊娠惡阻產後飲食不進半夏陳皮各五兩白茯苓三兩甘草二兩上㕮咀每服四錢水盞半姜七片烏梅一枚煎六分去滓熱服不拘時白朮散治妊婦宿風冷胎痿不長或失於腠理動傷胎氣多致損胎等疾牡蠣二錢蜀椒去目炒出汗三分白朮芎藭各四錢上為細末每二錢溫酒空心服腹痛加白芍藥心毒痛加川芎心煩嘔吐加細辛一兩半夏五十粒消渴者以大麥汁調服兼治室女帶下諸疾常服則保護胎藏人參散治初妊惡食嘔吐痰逆人參一兩枳殼炒三錢厚朴半兩甘草半兩上為細末每服二錢百沸湯調下空心食前日三服嚴氏第十三問妊娠頭目眩視物不見腮項結核者何也曰蓋因胎氣有傷肝臟毒熱上攻太陽穴痛嘔逆背項拘急致令頭暈生花若加涎壅危在片時宜急服消風散主之消風散石膏煅甘菊花防風荊芥穗羌活羚羊角川芎大豆黃卷炒當歸酒浸白芷各一兩甘草炙半兩上㕮咀每服四錢水盞半入好茶半錢煎八分通口服食前第五十五問居經之後或復有漏下答曰衝任二脈為經血之海皆起於胞中手太陽小腸手少陰心經互為表裡作胞之際壅之以養胎既產之後積之為乳汁或衝任氣虛不能制其經血故妊娠數月經水不調時下者此名漏胞漏不止則斃也止漏散療妊娠漏胞熟地四兩乾薑二兩上為細末每服二錢空心米飲調下又方益智不拘多少為細末米飲下次用香附甘草為末醋糊丸用四物湯去地黃理中湯去乾薑煎吞下二三十丸甚妙阿膠散治胎動不安及漏胎腹中痛阿膠一兩蛤粉炒令黃熟地桑寄生各一兩半龍骨三分當歸一兩銼炒甘草一兩炙白茯苓三錢白朮一兩芎藭三錢乾薑半兩炮製銼上㕮咀每服四錢水盞半棗三枚煎六分去滓熱服不拘時佛手散治婦人妊娠五七月因事築磕著胎或子死腹中惡漏下疼痛不已口噤欲絕用此藥探之若不損則疼止子母俱安若胎損立便逐下安胎者不用酒當歸六兩川芎三兩上為粗末每服三錢水一盞煎令泣泣欲干投酒一盞半止一沸去滓溫服口噤灌之如人行五七里再進不過兩三服服之便生膠艾湯妊娠不問深淺月數因頓僕胎動不安腰腹中急逼血或從口出或有所下或胎奔上刺心短氣安胎熟地二兩白艾炒當歸甘草炙芍藥川芎阿膠炒各一兩上㕮咀每服水一盞半煎七分去滓熱服胸中逆冷加生薑五片棗三枚煎服食前若虛人加黃耆一兩桂枝茯苓湯治宿有癥瘕妊娠經斷未及三月即動此瘕也經斷三月而漏下不止胎動在臍上者為症痼害當去其症又論云妊娠六月胎動者前三月經水利時胎下血者後斷三月脈也所以下血不止症不去故也桂心白茯苓牡丹皮桃仁炒白芍藥上為細末煉蜜丸如彈子大每服一丸溫酒或米飲湯食前細嚼下嚴氏第三問胎漏經血妄行者何也答曰妊娠或成形胎息未定或因房室驚觸勞力過度動傷胎胞或食毒物致令子宮虛滑經血淋瀝若不急治敗血湊心子母難保月漸胎干危亡不久桑寄生散治妊娠胎動不安下血不止桑寄生當歸酒浸川續斷酒浸茯神去木芎藭香附阿膠蛤粉炒白朮各一兩人參甘草炙各半兩上㕮咀每服四錢水盞半姜五片煎七分熱服不拘時第五十六問胎在腹中時時撞動不安答曰懷則以身依也娠則以時動也若腹中不時撞動者謂之胎動也多因勞役氣力觸冒冷熱飲食不適居處失宜輕者止轉動不安重者便致損墜若母有疾以疾動胎者治母則胎安若胎不固動致母病者治胎則母瘥若胎不牢固其胎必致損也保安散治妊娠胎氣不安心腹疼痛胎動安胎當歸一兩半人參一兩阿膠半兩蛤粉炒成珠甘草半兩炙上㕮咀每服三錢水盞半蔥白一莖拍破煎八分去滓溫服食前未定再服安胎飲治妊娠偶因所觸或從高墮下致胎動不安腰中疼痛服此藥後覺胎動處熱即胎已安縮砂不拘多少慢火炒令熱透後去皮取仁用上為細末每服三錢熱酒調下不飲酒者煎鹽艾湯調下食前嚴氏第一問妊娠兩三月胎動不安者何也曰男女陰陽會通血氣調勻乃成其孕設若下血腹痛蓋繇子宮久虛致令胎墮其危甚於正產若妊娠曾受此苦可預服杜仲丸杜仲去皮銼薑汁浸炒去絲川續斷酒浸各三兩上為細末棗肉丸桐子大每服七十丸空心米飲下一日三服第五十七問何謂子滿答曰妊娠之人經血擁閉以養其胎或掩水氣血水相搏以致體腫皆繇脾胃虛弱臟腑之間宿有停水之所掩也謂之子滿若水停不去浸漬於胎則令胎壞診其脈浮腹滿兼喘者其胎必墜也澤瀉散治妊娠氣壅身體腹脅浮腫喘息促急大小便秘澀澤瀉桑白皮枳殼麩炒黃檳榔赤茯苓木通各一兩上㕮咀每服四錢水盞半姜五片煎八分去滓溫服食前稍利為度效木通散治妊娠身體浮腫心腹脹滿小水不通木通一兩訶梨勒皮木香各三分香葇一兩一本茹枳殼半兩面炒檳榔半兩桑根皮一兩用白赤茯苓三分雞蘇莖葉一兩上㕮咀每服四錢水盞半姜五片煎六分去滓溫服食前商陸赤小豆湯赤小豆干商陸各等分上㕮咀每服一兩水一盞煎七分去滓溫服嚴氏第五問論胎冷腹脹虛痛兩脅虛鳴臍下冷痛欲泄小便頻數大便虛滑者何也曰胎氣既全子形成質或食瓜果甘甜飲冷不時之物當風取涼受不時之氣則令胎冷子身不能安處皮毛疼痛筋骨拘急手足攣拳致使母有危證急宜服安胎和氣散訶子煨白朮各一兩陳皮良薑炒木香煨白芍藥陳米炒甘草炙各半兩上㕮咀每四錢水盞半姜五片煎七分去滓溫服不拘時忌生冷第五十八問妊娠三月曾經墮胎至其月日復墜答曰陽施陰化則有胎也若血氣和調胎氣乃成若血氣虛損子藏為風冷所乘致虧營衛不能蔭養其胎故數墮也假令妊娠三月當手心主包絡經養之不善攝生傷經則胎墮後雖再有妊至其月日仍前犯之所以復墮也又有因墜墮驚恐或吐血下血者皆能損胎若妊娠常腰疼者喜墮胎也蓋腰為腎府女子以系胎也地榆散治妊娠損動胎胞下血不止地榆三錢乾薑三分當歸三錢龍骨三錢芎藭三錢艾葉半兩阿膠三錢蒲黃半兩熟地一兩黃牛骨腮一兩燒灰烏鰂骨二錢燒灰白朮半兩上為細末每服二錢以粥飲調下不拘時卷柏丸治妊娠數墮胎皆因血氣虛損子臟受風冷致令胎不堅固故頻有傷卷柏鍾乳粉鹿角膠搗碎炒令黃燥紫石英火煅研細水飛過陽起石火煅研細桑螵蛸炒熟地禹餘糧燒醋淬七次各一兩杜仲芎藭當歸銼炒桂心牛膝桑寄生五味子蛇床子牡丹皮各三分玄及上為細末煉蜜丸桐子大每服五十丸空心溫酒送下嚴氏第二問胎動腹痛者何也曰胎動腹痛其理蓋緣飲食冷熱動風毒物或因再交搖動骨節傷犯胞胎其候多嘔氣不調勻或服熱藥太過血氣相干急服順氣藥安胎不然變成漏胎則難療矣如聖湯鯉魚皮當歸熟地阿膠白芍葉川芎續斷酒浸甘草炙各等分上㕮咀每服四錢水盞半入苧根少許姜五片煎七分去滓空心服第五十九問大小二便秘結不通答曰陽虛不能運陰故氣無陰以清其陽則陽獨治而為熱陰虛不能運陽故氣無陽以和其陰則陰獨治而為厥是以二氣和則氣道平二便順則氣道通今二便秘結明陰氣之獨治也夫人有腑臟氣實而生熱者隨其停積之處而成病也若熱結大腸則大便不通熱結小腸則小便不通若大小便俱為熱所結故煩滿而二便結閉熱盛則腸胃氣逆冷則變為嘔也檳榔散治產後大小便秘心腹脹滿氣促檳榔一兩車前子三分冬瓜子三分川大黃一兩微炒木通一兩