溫服不拘時香薷飲治清濁相干霍亂吐痢香薷一兩半厚朴黃連各二兩上為飲子每服三錢水盞半煎七分去滓用新汲水頻頻頓極冷服之藥冷則效速也第六十八問何謂子煩答曰煩有四證有心中煩有胸中煩有虛煩有子煩諸如此者皆熱也若臟虛而熱氣乘心則令心煩但煩熱而已別無他證者名曰虛煩若積痰飲而嘔吐涎沫者謂之胸中煩或血飲停積虛熱相搏以其妊娠而煩故謂之子煩也犀角散治妊娠心煩熱悶犀角屑地骨皮黃芩麥門冬赤茯苓各一兩甘草炙半兩上為飲子每服四錢水盞半煎八分去滓入竹瀝一合更煎數沸溫服不拘時當歸飲子治妊娠胎動心煩熱悶當歸芎藭阿膠豆豉桑寄生各半兩蔥白七莖上為飲子每服三錢水二盞煎八分去滓溫服不拘時竹瀝湯療妊娠常苦煩悶此子煩也竹瀝二合防風三兩黃芩三兩茯苓四兩麥門冬三兩上為飲子水四升合竹瀝煮取二升半分三服不瘥重作第六十九問何謂子嗽答曰肺主氣外合皮毛風寒外感入射於肺故為咳也有涎者謂之嗽無痰者名曰咳夫五臟六腑俱受氣於肺各以其時感於寒而為病也秋則肺受之冬則腎受之春則肝受之夏則心受之長夏則脾受之長夏者夏末秋初也諸藏不已各傳於腑也妊娠而嗽者謂之子嗽久而不已則傷胎天門冬湯治惡熱咽燥脈數咳嗽甚則咯血天門冬半兩紫菀知母各一兩桑白皮五味子桔梗上為飲子每服五錢水二盞煎一盞去滓溫服有血者加阿膠半兩大便澀而喘者加葶藶半兩百合散治妊娠咳嗽心胸不利煩悶不欲飲食百合紫菀麥門冬桔梗桑白皮各一兩甘草炙半兩上為㕮咀每服四錢水盞半入竹茹一分煎八分去滓入蜜半匙更煎三四沸方可不拘時候溫服緩息丹治肺氣不調痰壅咳嗽上氣喘滿咳嗽唾痰沫日夕不安止半夏曲二兩半夏湯洗七次研成末薑汁和候乾再為末薑汁再和共七八次取吃之不辣為度橘紅五錢天門冬半兩杏仁一兩去皮尖別研成霜上三味為末次拌研細杏仁霜煉蜜和每兩分十五丸每服一丸隨津調之食後服第七十問何謂胸痹答曰胸痹者繇寒氣客於臟腑氣上衝心胸下愊愊如滿噎塞習習痹痛飲食不下謂之胸痹也脾胃漸弱乃至斃人妊婦為患亦損傷胎也枳實理中湯丸治結胸欲絕心膈高起手不可近白茯苓人參各二兩枳實十六片乾薑炮白朮各二兩甘草炙二兩上為細末蜜丸如雞子黃大每服一丸熱湯化下連進二三服胸中豁然而開渴者加栝蔞根二兩下痢者加牡蠣二兩桔梗枳殼湯治痞氣胸滿欲絕枳殼桔梗湯洗去穰各一兩上銼麻豆大分二服水二盞煎一盞去滓溫服不拘時沉香理氣湯治氣滯不和胸膈虛痞丁香檀香木香各半兩藿香二兩甘草二兩砂仁半兩白豆蔻一兩用仁沉香烏藥人參各一兩上為末每服一錢入鹽一字沸湯點服不拘時調氣丸治氣道不順胸膈壅塞青皮炒陳皮炒木香各一兩不見火上各銼碎用牽牛末四兩炒牽牛末焦黃篩去不用以三味為細末蜜丸桐子大每服五十丸空心薑湯送下第七十一問何謂子癇答曰風是四時八方之氣常以冬至日候之風從其方來者長養萬物不從其方來者乃名虛邪賊風體虛之人中之者隨其虛而為病也夫五臟六腑之俞皆在於背臟腑既虛則邪乘虛而入傷隨其臟腑所感而發時能言者可治不能言者難治若傷太陽之經復遇寒濕相搏口噤背強名之曰痓故妊娠而發者悶冒不識人須臾則醒醒而復發名曰子癇又名子冒久則變成痓妊娠忽悶眼直不識人須臾醒醒復發似不醒者名曰痓病亦號子癇亦號子冒以葛根湯若有竹近可速辦當先作竹瀝湯其竹遠不可即辦者當先辦葛湯此二物偏療諸痓絕可以起死也小兒忽癇痓與金瘡療之亦驗作竹瀝法於後取新伐青淡竹斷之除兩頭節作片以磚並側令竹兩頭虛布列其上燒中央兩頭汁出以器盛之取服葛根湯療妊娠臨月因發風痓忽悶憒不識人吐逆睡少醒復發名為子癇貝母葛根牡丹皮去心防己防風當歸芎藭肉桂取肉白茯苓澤瀉甘草炙各二兩獨活石膏人參上件以水六升煮取三升分三服其貝母令人易產若未臨月者以升麻代之忌海藻菘菜鮓物第七十二問胎痿過年不產又兩胎一死一生答曰陽施陰化精盛有餘者則成二胎脈經云左右脈俱疾為二子又云俱沉實猥生二男俱浮大猥生二女且胎之在胞以氣血滋養若寒溫節適血氣強盛則無傷若冷熱失宜氣血損弱則胎痿燥而不育或過年久而不產若雙胎遇寒經養不周故偏夭傷候其胎上冷是胎已死如雞乳子熱者為祿寒者多渴正謂此也乾地黃丸治妊娠氣血虛弱胎氣不長熟地黃一兩芎藭白茯苓人參當歸各五分柴胡半兩刺薊桑寄生各半兩厚朴一兩龍骨阿膠各三分白石脂三分黃耆半兩甘草一分炙上為細末蜜和搗二三百杵丸如桐子大每服三十丸清粥飲湯送下不拘時雄黃丸治妊娠是鬼胎致腹中黑血數下腹痛雄黃細研累臼去毛一本鬼臼去心莽草丹砂細研巴豆去皮心細獺肝炙黃各半兩蜈蚣一枚炙黃蜥蜴一枚炙黃上為細末煉蜜和搗三百杵丸如桐子大空腹溫酒下二丸日進二服服後當下痢如不痢加至三丸初下清水次下蟲如馬尾狀無數病極者下蛇蟲或如蝦卵雞子或如白膏或如豆汁其病悉愈白朮散調補衝任扶養胎氣治妊娠宿有風冷胎痿不長或失於將理動傷胎氣多致損墮懷妊常服壯氣益血保和胎臟牡蠣三分白朮四分芎藭四分川椒去目炒三分療妊娠兩兒腹中一死一活令死者出生者安此方神驗萬不失一蟹爪一升甘草二尺炙阿膠三兩上以東流水一斗先煮二味取三升內納膠令烊頓服不能頓服分再服若人困拗開口下藥入即活煎藥宜向東以茅葦薪煮之第七十三問妊娠墮胎或血出不止或血不出答曰血寒則凝溫則散墮胎損經血出不止有二一則因熱而流散二則血氣虛而不斂瀉血多者必煩悶而死或因風冷墮胎者血冷相搏氣虛逆上則血結不出搶上攻心則煩悶亦多致死當溫經逐寒其血自行也膠艾湯治勞傷血氣衝任虛損月水過多淋瀝漏下連日不斷臍腹疼痛及妊娠將攝失宜胎動不安腹痛下墜或勞傷胞絡胞阻漏血腰痛悶亂或因損動胎上搶心奔沖短氣及因產乳衝任氣虛不能約制經血淋瀝不斷延引日月漸成羸瘦阿膠芎藭甘草各二兩炙當歸艾葉微炒各三兩熟地白芍各四兩上㕮咀每服三錢水一盞酒六分煎八分去滓稍熱服空心日服三次甚者連夜並服伏龍肝散治血氣勞傷衝任脈虛經血非時忽然崩下或成豆汁或成片或五色相雜或赤白相兼臍腹冷痛經久未止令人黃瘦口乾飲食減少四肢無力虛煩驚悸伏龍肝一兩竉口土熟地二兩甘草炙半兩芎藭二兩肉桂半兩當歸炒三分乾薑炮三分艾葉微炒二兩赤石脂一兩麥門冬一兩上為粗散每服四錢水盞半棗三枚煎八分去渣溫服食前當歸散治妊娠猝驚奔走或從高墜下腹痛下血不止當歸一兩半炒阿膠二兩搗碎令黃色艾葉炒一兩芎藭一兩上為飲子每服四錢水盞半煎至六分次入生薑汁一匙地黃汁半合馬通汁半合更煎三兩沸去渣溫服不拘時第七十四問何以謂之子淋答曰腎者作強之官伎巧出焉與膀胱為合男子以臟精女子以系胞啟玄子云強於作用故曰作強造化形容故曰伎巧在女則當伎巧在男則正當作強天淋者腎虛膀胱熱也腎虛不能制水則小便數也客熱乘膀胱則水行澀澀而且數淋瀝不宣妊娠之人系胞於腎腎患虛熱成淋故謂子淋也治療妊娠患子淋小便數而少或熱痛痠疼地膚草三兩以水四升煮取二升半分三次服療妊娠患子淋宜地膚湯地膚草車前子各三兩知母黃芩赤茯苓赤芍枳實炙升麻通草甘草炙各二兩上㕮咀每服四錢水盞半煎八分去滓空心溫服或無地膚葵根汁亦妙石韋散治產後小便淋瀝溺血石韋去毛榆白皮木通各一兩黃芩三錢赤芍葵子各半兩上為粗散每服三錢水盞半入生地黃一分煎六分去滓日三四服第七十五問小便或有利者或有不通答曰小腸為盛受之府膀胱乃州都之官啟玄子云位當孤府故謂都官居下內空故藏津液若得氣海之氣則能泄注也或受熱滲於脬脬屈擗而系轉故使小便不通利也或腎胞有冷不能溫制於水道故小便日夜十數行甚者至於亂夢恍惚寒者宜大建中湯蓯蓉丸熱者琥珀散方見指迷方萆薢丸益腎固氣小便頻數萆薢青鹽三銖水半盞煮熟秤取半兩金毛狗脊炮三分益智子捶碎鹽炒半兩肉蓯蓉一兩切焙菟絲子半兩酒浸研巴戟半兩杜仲麩炒半兩黃耆一錢上為細末酒糊丸如桐子大每服四十丸空心淡鹽湯米湯下冬葵子散治妊娠胎不安小便淋瀝小肚疼痛冬葵子炒柴胡桑白皮赤茯苓赤芍當歸各等分上為㕮咀每服四錢水盞半姜五片蔥白七寸煎七分去滓溫服車前子散除下焦留熱小便不通淋瀝作痛車前子檳榔木通陳皮赤芍赤茯苓當歸滑石石韋炙去毛各一兩上㕮咀每服五錢水二盞煎一盞溫服以利為度未利者再服食前忘憂散治心經蓄熱小便赤澀不通淋瀝作痛琥珀不拘多少上為細末每服五分濃煎萱草根湯調下食前第七十六問大便或利或秘答曰大腸者傳導之官變化出焉獨受陰陽之濁化其糟粕傳不潔之道若三焦不調臟腑不和受熱則津液竭燥腸胃痞澀大便不通有寒則腹痛腸鳴水穀並下故熱則宜清而通之寒則宜溫而固之建中散治脾胃不和中脘氣滯宿寒留飲停積不消心腹刺痛脅肋膨脹嘔吐痰涎逆噫氣吞酸腸鳴泄痢水穀不化肢體倦怠不思飲食青皮一本無青皮棗子一斤厚朴一斤甘草半夏湯泡洗浸五兩陳皮八兩乾薑炮五兩以上六味用水三斗煮令水盡焙乾人參去蘆一兩藿香一兩訶子炮取二兩白朮一兩白茯苓一兩草豆蔻去皮一兩上為飲子每服二錢水二盞姜三片煎六分去渣溫服食前四味換腸丸治便下覺臟腑疼痛泄痢飲食不美因多思所致或寒氣積遂成其痢一名白朮止痢丸白朮三分訶子炮去核取肉三分肉豆蔻三分鍾乳粉一兩上為細末入鍾乳粉拌麵糊為丸桐子大每服五十丸空心熟水送下止進三兩服便效熱者服四順飲子治大便不通面赤身熱大黃白芍甘草當歸各等分上為粗散每服五錢水盞半煎一盞去滓溫服不拘時麻仁丸治腸中受風津液燥少往往大便秘麻仁去皮研二兩枳實四兩麩炒白芍四兩大黃四兩炮厚朴二兩杏仁二兩上為細末蜜丸梧桐子大米飲下二十丸未通加至三十丸寒者理中湯治腸胃冷熱濕泄瀉注下水穀不分腹中雷鳴及傷時氣裡寒外熱霍亂吐痢手足厥冷胸脾心疼逆氣結氣並皆治之人參甘草白朮乾薑炮各二兩肉豆蔻砂仁各二兩上為飲子每服三錢水盞半煎一盞去滓熱服食前煮樸丸治臟寒泄痢北棗半斤川芎四兩生薑切片四兩以上三味水三碗煎乾將生薑厚杵爛入棗肉一處再杵令細以麻油塗手擔如小錢慢火焙乾入後藥蒼朮米泔浸茴香炒甘草炙官桂去皮新者神麯麥蘖炒淨秤莪朮煨各四兩砂仁良薑炒各二兩肉豆蔻煨二兩丁香一兩川薑二兩上為細末水煮薄糊為丸梧桐子大每服百丸米飲湯下不拘時豆蔻橘紅散溫脾養胃消穀嗜食丁香木香一兩白豆蔻仁人參白朮厚朴神麯乾薑炮半夏曲炒陳皮去白藿香葉去土甘草炙各半兩上為細末每服三錢水一盞姜三片棗一個煎七分去滓空心溫服第七十七問妊娠至八九個月兩腳俱腫答曰妊娠至八九月腿腳腫者不可為水病治之恐導其真氣見此狀者則知其易產也蓋胞藏水血俱多不致胎燥故云易產也當服順氣滑胎之藥若初妊而腫者是水氣過多兒未成體恐壞胎也枳殼散養胎氣安和子臟治胎中一切惡疾能令胎滑易產枳殼去穰炒四兩甘草炙一兩上為細末每服二錢沸湯調服空心入月日進三服榆白皮湯滑胎易產治妊娠曾因漏胎去血臨產驚動太早產未至穢露先下致胎胞乾燥臨產艱難冬葵子一兩木通半兩榆白皮一兩瞿麥一兩牛膝去苗酒浸焙大麻仁去殼各三分上為粗末每服三錢水盞半煎八分去滓溫服不拘時救生散安胎益氣易產人參訶子濕紙裹煨熟去核陳皮炒白朮炒大麥肉炒神麯炒各半兩上為細末每服二錢水一盞煎六分去滓入月加一倍用水二盞煎一盞空心溫服服之能令兒緊小乳母無患第七十八問妊娠十月將養之法答曰陰搏陽別謂之有子此是血氣和調陽施陰化也診其手少陰脈動甚者妊子也所謂妊者陽既授始陰妊之也娠則以時而動故曰妊娠也妊娠一月名始胚飲食精熟酸美受御宜食大麥無食腥辛是謂正才妊娠一月足厥陰脈養不可針灸其經足厥陰內屬於肝肝主於筋及血一月之時血行痞澀不為力事寢心安靜無令恐畏妊娠一月陰陽新合為胎寒多為痛熱多猝驚舉重腰疼腹滿飽急猝有所下當預安之宜服烏雌雞湯烏雌雞一隻炙如常法食茯苓二兩吳茱萸一升芍藥人參白朮各三兩麥門冬五合阿膠二兩甘草一兩上九味㕮咀水一斗二升煮雞取汁六升去雞下藥煎取三升納酒三升並膠烊盡取三升放溫每服一升日三服妊娠曾於第一個月墮胎者入月預服此藥治之補胎湯人參防風細辛烏梅肉白朮各一兩大麥一合熟地一兩吳茱萸半兩洗七次上為飲子每服三錢水盞半姜三片煎七分去滓空心服寒多者倍細辛茱萸渴者去細辛加栝蔞根若有所思去大麥加柏子仁三合服之妊娠二月名始膏無食腥辛之物居心靜處男子勿勞百節皆痛是謂胎藏也少陽者膽之脈也主於精二月之時兒精成於胞里故足少陽養之足少陽在足小指間本節後附骨上一寸陷中者是妊娠二月陰陽居經若有寒多壞不成有熱則萎萃怯弱中風寒有所動搖心滿臍下脹急腰背強痛猝有所下乍寒乍熱服艾葉湯人參當歸艾葉甘草麻黃去根節丹參各一兩阿膠炒二兩上為㕮咀每用一兩水盞半棗三枚姜五片好酒一盞煎半盞去滓分為二服食前妊娠曾於第二個月墮胎者入月預當養其胎藏服黃芩湯黃芩人參阿膠各一兩炒碎當歸半兩炒乾吳茱萸一分洗七次焙乾微炒上為㕮咀每服三錢水盞半姜三片煎八分去滓食前如覺大段不安加烏梅一兩妊娠三月始胎當此之時血不流通形像始化末有定儀見物而變欲令見貴盛王公好人端正莊嚴不欲令見傴僂侏儒醜惡形人及猿猴之類無食姜兔無懷刀繩欲得見男者操弓矢射雄雞乘肥馬于田野觀虎豹及走犬其欲得女者則箸簪珂環弄珠璣欲令子美好端正者數視白璧美玉看孔雀食鯉魚欲令兒多智有力則啖牛肉心食大麥欲令子賢良盛德端心正坐清和虛一坐無邪席立無偏倚行無邪徑目無邪視口無邪言心無邪念無妄喜怒無得思慮食無到臠無邪臥無橫足思欲瓜果啖味酸菹好芬芳惡見穢臭是謂外像而變者也手心主養之手心主者脈中精神內屬於心能混神故手心主養之手心主穴在掌後橫紋者是診其妊娠脈滑疾重以手按之散者胎已三月也妊娠三月為定形有寒則大便青有熱則小便赤不赤則黃若猝驚恐懼憂愁嗔恚傷動於筋脈繞臍痛或腰背痛猝有所下服雄雞湯人參麥門冬白茯苓當歸白朮甘草川芎白芍各一兩阿膠二兩上為㕮咀每服用一兩入煮烏雞汁一盞半棗二枚好酒一盞煎至一盞半去滓分作二服食前妊娠曾於第三個月墮胎者入月宜服茯神飲子茯苓丹參龍骨各一兩人參阿膠炒當歸甘草炙各二兩赤小豆炒一合上為㕮咀每服三錢水盞半棗一枚煎八分去滓溫服腰痛者加寄生二兩空心服妊娠四月之時始受水精以成血脈其食宜麥粳其羹宜魚雁是謂盛榮以通耳目而行經絡洗浴遠避寒暑是手少陽者三焦之脈也內屬於腑四月之時兒六腑順成故手少陽養之手少陽穴在手小指間本節後二寸是也診其妊娠四月欲知男女左脈疾為男右脈疾為女俱疾為生二男當此之時慎勿瀉之必致產後之殃何謂也是手少陽三焦之脈內屬於三焦靜形體和心志節飲食妊娠四月若有寒心中欲嘔胸滿不食有熱則小便頻數如淋狀臍下若急卒風寒項頸強痛寒熱驚惕腰背及腹痛往來不定或胎上急迫心頭煩悶不安卒有所下宜服菊花湯當歸人參麥門冬甘草麻黃去節半夏湯洗七次阿膠炒二兩菊花半兩上為㕮咀每服四錢水盞半姜三片棗一枚煎八分去滓空心溫服非風寒項強者當去麻黃半夏緣二藥能損胎調中湯白芍白朮柴胡甘草炙烏梅肉續斷當歸川芎枳實厚朴甘李根皮羸人去之各等分上為㕮咀每服三錢水盞半姜四片煎八分去滓溫服空心妊娠五月始受火精以成其氣臥必晏起洗浣衣服淨室必厚其裳朝吸天光以避寒殃其食宜稻麥其羹宜牛羊和以茱萸調以五味是謂養氣以定五臟者也一本云宜食魚鱉足太陰養之足太陰脾之脈主四季五月之時兒四肢皆成故足太陰養之足太陰之穴在足內踝上三寸也診其妊娠之脈重手按之不散但疾不滑者五月也又其脈數者以向懷脈緊者必胞阻脈遲者心腹滿喘脈浮者必水懷為腫妊娠五月若有熱頭眩心亂欲嘔者有寒則腹痛小便難猝悸恐四肢疼痛寒熱胎動無常或損僕腹痛有所不安服旋覆花湯旋覆花當歸人參黃耆一本黃芩麥門冬赤芍吳茱萸洗七次各一兩阿膠炒二兩甘草炙半兩上為㕮咀每服四錢水盞半姜三片好酒三分煎八分空心溫服妊娠六月始受金精以成其筋身欲微勞無得靜處出遊於野數觀走犬及視走馬宜食鷙鳥猛獸之肉是謂變腠膂筋以養其爪以牢其背膂足陽明養之足陽明胃之脈主其口目六月之時兒口目皆成故足陽明養之足陽明穴在太衝上二寸是也妊娠六月猝胎動不安寒熱往來腹痛滿身腫驚怖血下腹痛狀如欲產手足煩熱並宜服麥門冬湯麥門冬人參甘草炙黃芩各一兩熟地阿膠蛤粉炒各二兩上為㕮咀每服四錢水盞半入酒五分姜五片棗二枚煎八分去滓溫服食前妊娠曾於六個月損墮者入月預服柴胡散柴胡去苗白芍麥門冬熟地蓯蓉酒浸焙川芎白朮各一兩甘草炙半兩上為㕮咀每服四錢水盞半棗三枚煎八分去滓溫服空心妊娠七月始受木精以成骨勞躬搖肢無使身安動作屈伸居處必燥飲食避寒常宜食粳稻以密腠理是謂養骨牢齒者也手太陰養之手太陰者肺肺主皮毛七月之時兒皮已成故手太陰養之手太陰穴在手大指本節後白肉際陷中是診其妊娠七月脈實大牢強者生沉細者死懷軀七月暴下鬥余水其胎必傷而墮此非時孤漿預下故也喘促頸項腰背強服蔥白湯半夏洗七次黃耆人參當歸黃芩各一兩阿膠炒二兩旋覆花甘草炙麥門冬去心各等分上為㕮咀每服四錢水盞半姜三片蔥白二寸好酒半盞煎至八分去滓溫服空心妊娠曾於第七個月傷墮者宜預服杏仁湯杏仁泡去皮尖鍾乳粉紫菀吳茱萸甘草炙乾薑炮五味子麥門冬粳米各等分上為㕮咀每服四錢水盞半煎八分去滓空心服妊娠八月始受土以成膚革和心靜息無使氣極是謂密腠理而光澤顏色手陽明養之手陽明者大腸之脈大腸主九竅八月之時兒九竅皆成故手陽明養之手陽明穴在大指本節後宛宛中是診其妊娠八月脈實大牢強弦緊者生沉細者死妊娠八月忽中風寒有所犯觸身體疼痛乍寒乍熱胎動不安常若頭眩繞臍疼痛有寒小便白濁或復漏下顏色無定腰背冷痛目視範範悉宜服芍藥湯厚朴二兩甘草當歸白朮各三兩人參白芍各一兩上為㕮咀每服四錢水一盞酒半盞姜五片薤白七寸煎八分溫服妊娠曾於八個月傷墮胎者宜服葵子湯厚朴二兩甘草當歸白朮各三兩人參白芍各一兩柴胡三兩葵子上為㕮咀每服四錢水盞半姜五片棗一枚煎八分空心溫服妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自持而待之時為養毛髮多才力足少陰養之足少陰者腎之脈腎主續縷九月之時兒脈續縷皆成故足少陰養之足少陰穴在足內踝後微近下前動脈是也妊娠九月若猝得下痢腹滿脹急胎上衝心腰背不可轉側短氣滿悶並宜服半夏湯半夏湯洗七次麥門冬吳茱萸當歸阿膠炒各三兩乾薑一兩大棗十二枚上為㕮咀每服五錢水盞半煎六分去滓入蜜少許空心服一方用烏雌雞煮汁煎藥妊娠曾於第九個月墮胎者宜先服茯苓豬腎湯白茯苓桑寄生熟地白朮川芎麥門冬去心人參各一兩乾薑炮半兩上為㕮咀先以豬腎一對切去脂膜用水一碗入黑豆一合同煮取汁一盞半入藥八味五錢煎至一盞去滓食前溫服分為二服妊娠十月五臟俱備六腑齊通納天地氣于丹田故使關節人神咸備然可預備滑胎方法也妊娠十月滿足入月預修正順產理滑胎易產甘草散甘草炙黑豆炒大麻仁別研入糯米各一兩乾薑炮半兩白茯苓半兩吳茱萸半兩洗七次上為細末入麻仁末同拌每服二錢溫酒調下未入月不可調服第七十九問橫生逆產答曰將產坐臥須順四時方面並避五行禁忌若有觸犯多令產難或因漏胎去血臟燥或子臟宿挾疹病並觸禁忌或覺腹痛產時未到便即驚動穢露下早致子道乾澀產婦力疲又有橫逆不順者皆難產也或有子上逼心者皆繇妊娠之人失於將養也大抵臨產之際腹痛而腰不痛者未產也若腹痛連腰甚者即產所以然者腎候於腰胞系於腎故也診其尺脈轉大如切繩轉珠者謂之離經日中覺夜半生若腰痛甚者即產也愚謂橫生逆產者皆因少母未經生育將產之時不肯忍痛務欲逼下為妙殊不知時候未到胎氣未至其子未能翻身受逼不過只得一任離胎逕下以至倒生其有橫生者其子離胎將欲翻身投下半中之間被母逼緊轉身不及以至橫下古人云瓜熟蒂落粟熟自出自然之理凡有橫逆皆繇母不能忍痛也烏金散治橫生難產及催生此方救子母於頃刻百草霜香白芷上等分為細末每服二錢以童便醋各少許調更以熱湯化下未愈再服乳香丸治難產乳香一兩研為細末上用豬心血和作十丸每服一丸煎乳香湯化下出衣法治妊娠胎死腹中衣不出及產後猝有別病欲至狼狽若胎衣未下腹滿宜水一盞半煮豬脂一兩煎五七沸和脂服下之寤生丸治難產枳實六兩一本枳殼桑白皮干六兩以上二味入大鐺內以長河水煮半日許候枳實透軟去桑白皮不用取枳實去穰薄切作小片子焙乾再入後藥木香半兩甘草炙半兩上四件和為細末煉蜜丸桐子大曬乾每日空心日午臨臥各用溫米飲送下三十丸加至五七十丸日三服懷七個月後服第八十問熱疾胎死腹中答曰因母患熱疾至六日以後臟腑極熱熏煮其胎是以致死緣兒身死冷不能自出但服黑神散暖其胎須臾胎氣溫暖即自出何以知其胎之已死但看產婦舌青色者是其驗黑神散官桂當歸芍藥甘草乾薑炮生地各一兩黑豆炒焦去皮二兩附子炮半兩一本作蒲黃上為細末每服一錢空心溫酒調下烏金散治產後血迷血運敗血不止淋瀝不斷臍腹疼痛頭目昏眩無力多汗及治崩中下血過多不止宜服麒麟竭亂髮松墨煅醋淬百草霜當歸頭肉桂赤芍玄胡索鯉魚鱗燒上等分為細末每服二錢溫酒調服下黑龍丹治產後一切血疾垂死者但灌藥無有不效五靈脂生地當歸川芎高良薑以上各等分入沙合內赤石脂泯縫紙筋鹽泥固濟封合炭火十斤煅通紅去火候冷開取合子看成黑糟乃取出細研入後藥硫黃研一分半花乳石煅一分乳香別研一分半琥珀研一分百草霜別研五兩上同為細末醋煮糊丸彈子大每服一丸炭火燒通紅投生薑自然汁與無灰好酒各一小合小便半盞內研開頓服立效芎藭湯治產後去血過多運悶不省及傷治去血多崩中去血多金瘡去血多拔牙齒去血多不止緣虛心煩眩暈頭目暗耳聾滿塞舉頭欲倒並皆治之當歸芎藭各等分上為飲子每服三錢水盞半煎一盞去滓稍熱服不拘時第八十一問胎衣不下答曰母生子訖血流入衣中衣為血所脹故不得下治之稍緩脹滿腹中以次上衝心胸疼痛喘息急者難治但服奪命丹以速去衣中之血血散脹消胎衣自下而無所患奪命丹附子半兩牡丹皮一兩乾漆碎炒煙盡二分半上為末醋一升大黃末一兩同熬成膏和藥丸如桐子大溫酒送下每服五十丸不拘時牛膝湯治產兒已出胞衣不下臍腹堅滿脹急疼痛及子死腹中不得出者宜服滑石八兩當歸木通各六兩冬葵子五兩牛膝去苗酒浸焙瞿麥各四兩上為㕮咀每服三錢水二盞煎八分去滓稍熱服不以時候第八十二問難生答曰胎側有成形塊別呼為兒枕子欲生時枕破與敗血裹其子故難生但服勝金散逐其敗血即自生逆生橫生並皆治之勝金散麝香一錢鹽豉一兩舊青衣裹燒令通紅急以乳缽研為細末上為細末取秤錘燒紅以酒淬之調藥一錢七服琥珀黑散治產婦一切疾病產前胎死產難逆橫生產後胎衣不下衣帶先斷遍身疼痛口乾心悶非時不語如血暈眼花誤以為暗風乍寒乍熱誤以為瘧疾四肢浮腫誤以為水氣言語顛倒見鬼見神誤以為邪崇腹脅脹滿嘔逆不定誤以為反胃大便秘澀小便出血誤以為五淋及惡露未盡經候未還起居飲食便不戒忌血氣之疾聚即成塊散即上衝氣急心痛咳嗽多睡四肢虛熱睡驚盜汗崩中敗癥繞臍刺痛或頭面赤因變骨蒸皆宜多服若產後鼻衄口鼻黑色氣起喉中喘急中風口噤皆為難治須急服之凡產前宜進一二服皆能安神順胎產後雖無疾七日內亦進一二服能散諸疾或因驚恐變生他證當連服取效琥珀別研硃砂別研松墨百草霜新羅白附子白殭蠶炒去絲當歸去蘆黑衣灶屋塵各半兩一作突煙麝香別研血苗灰鯉魚鱗各二分半上為細末每二錢炒姜溫酒和童便調下食前第八十三問產後血運答曰產後氣血暴虛未得安靜血隨氣上迷亂心神故眼花甚者令人迷絕口噤神昏氣冷醫者不識呼為暗風若作此治病必難愈但服清魂散澤蘭葉二分半人參二分半荊芥穗一兩川芎半兩甘草炙一分上為細末每服一錢熱湯溫酒各半盞調下咽喉即開眼氣定人事省七寶散初產後調血和氣補虛壓驚悸治虛運硃砂研桂心乾薑炮當歸羚羊角川芎人參茯苓各半分上為細末若產婦平和三日以前直至滿月每日各取一字以羌活豆淋酒調下空心服若覺心胸煩熱即減桂姜冷即加之腹痛加當歸心悶加羚羊角心胸氣短加桂不下食或噁心加人參虛顫加茯苓以意斟酌日二服夜一服不飲酒者童便酒少許調下第八十四問產後口乾痞悶答曰產後宮胃太虛血氣未定食麵太早胃不能消化面毒結聚於胃脘上熏胸中是以口乾煩渴心下痞悶醫者不識認為胸膈壅滯此宜服見晛丸薑黃京三稜蓽澄茄人參青皮高良薑莪朮各等分上為末用細蘿蔔慢火煮令爛研細將汁煮糊為丸桐子大蘿蔔湯下不拘時木香丸治婦人有妊傷食京三稜此藥能落胎不可用前胡五分代之產後用之無礙木香人參茯苓去皮各二錢上為細末麵糊丸如綠豆大每服三十丸熟水送下白朮散治氣不調和飲食許學士云妊婦傷食難得藥惟此二方穩捷白朮炒一兩乾紫蘇一兩白芷微炒三錢人參七錢半川芎訶子皮一本作肉青皮各半兩甘草二錢半上為粗末每服二錢水一盞姜三片煎七分溫服不拘時候六君子湯治胸膈痞塞脾寒不嗜食燥藥不得服枳殼麩炒陳皮人參白朮白茯苓半夏洗各等分上為㕮咀每服五錢水二盞姜五片煎一盞去滓溫服無時第八十五問產後乍寒乍熱答曰陰陽不和敗血不散皆令乍寒乍熱產後血氣虛損陰陽不和陰勝則乍寒陽勝則乍熱陰陽相勝則或寒或熱若因產勞傷臟腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫人誤作瘧疾治謬矣陰陽不和宜增損四物湯敗血不散宜奪命丹又問二者何以別之答曰時有刺痛者敗血也但寒熱無他證者陰陽不和也增損四物湯當歸芍藥人參川芎乾薑各一兩甘草炙四分上為㕮咀每服二錢水一盞姜五片煎六分去滓熱服增損柴胡湯治婦人產後虛羸發寒飲食少腹脹柴胡三錢人參甘草半夏白芍陳皮川芎上為㕮咀每服四錢水盞半姜三片棗一枚煎七分溫服食後日三服豬腎湯治產後日淺久坐視聽言語多或運動勞力遂覺頭項及肢節皮肉疼痛乍寒乍熱此是蓐勞豬腎一對去脂膜當歸芍藥生薑各三兩桂心蔥白二合上以水八升緩火煮腎汁六升澄清內入諸藥煮取二升分三次溫服加減八珍湯當歸一錢半川芎一錢熟地薑汁炒五錢白朮一錢白茯苓一錢人參三分益母草一錢陳皮五分砂仁五分上為㕮咀水一鍾半煎七分食前溫服二劑後與益母丸間服服益母丸用芎歸湯送下第八十六問產後四肢虛腫答曰產後敗血乘虛停積於五臟不行經絡流入於四肢留滯日深卻還不得腐壞如水故令四肢面目浮腫醫人不識便作水氣治凡治水氣多用導水藥極虛夫產後既虛是謂重虛往往因致夭枉但服調經散自然血行腫消調經散此方百發百中沒藥研琥珀研各一分官桂赤芍當歸各一兩細辛麝香研各半分甘草炙二錢嚴氏方中多此一味藥上為細末每服五分七生薑汁溫酒各少許調服正脾散治大病之後脾氣虛弱中滿腹脹四肢虛浮狀若水氣此藥治之及產後四肢浮腫莪朮香附茴香炒甘草炙陳皮各等分上為細末每服二錢煎燈心木瓜湯調下第八十七問產後乍見鬼神答曰心主身之血脈因產傷耗血脈心氣則虛敗血停積上干於心心不受觸遂致心中煩躁臥起不安乍見鬼神言語顛倒醫人不識呼為風邪如此治之必不得愈但服調經散加生龍齒一捻得睡即安調經散方見八十六問上件藥如前每服加龍齒一捻柏子仁散治產後謊言亂語繇內虛少血邪氣攻心柏子仁遠志人參桑寄生防風琥珀細研當歸熟地甘草各半兩上為㕮咀每服以水二盞入白羊心一個切碎先煎七分去心滓須下藥五錢更煎四分去滓溫服不拘時琥珀散治產後血邪攻心迷悶言語錯亂琥珀研鐵粉各一兩人參茯苓乾生地阿膠各七分半炒令黃色硃砂研半兩遠志七錢半去心甘草麝香研各二錢半上為細末入研了藥同和極細每服一錢金銀湯調下無時第八十八問產後不語答曰人心有七孔三毛產後血氣多端致停積敗血閉於心竅神志不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故令不語如此但服七珍散人參石菖蒲熟地川芎各一兩細辛一錢半防風半兩硃砂半兩研上為細末每服一錢金銀薄荷湯調下不拘時交感地黃丸治婦人產前產後眼見黑色或即發狂如見鬼狀胞衣不下失音不語心腹脹滿水穀不化生地洗淨研以布絞汁留滓以薑汁炒地黃滓地黃汁炒生薑滓一至干為度生薑洗刮淨研以布絞取汁留滓各二斤當歸一兩琥珀別研一兩玄胡索糯米炒令赤去米蒲黃炒小茴香四兩上為細末蜜丸彈子大當歸湯化下一丸食前第八十九問產後腹痛又瀉痢答曰產後腸胃虛怯寒邪易侵若未滿月飲冷當風乘虛進襲留於胸膈散於腹肋故腹痛作陣如錐刀所刺流入大腸水穀不化洞泄腸鳴或下赤白脅肋膨脹或走痛不定急服調中湯立愈若醫者以為積滯取之則禍不旋踵調中湯高良薑當歸官桂白芍附子川芎各一兩甘草半兩人參半兩上為㕮咀每服三錢水二盞煎一盞去滓熱服空心食前定痛散治產後惡血不止腹內熱痛不可忍及兒未定當歸芍藥各二兩桂心一兩上為㕮咀每服二錢各盞半生子大拍破煎至六分去滓溫服如洞泄腸鳴者加附子乾薑下服又方治產後瘀血怯痛不已生料五積散加乾薑良薑丁香官桂用煮酒童便各一盞熱服立效又方獨用肉桂末調好酒服之立效第九十問產後遍身疼痛答曰產後百節開張血脈流走遇氣弱則經絡肉分之間血多留滯累日不散則骨節不利筋脈引急故腰背不得轉側手足不能動搖身熱頭痛也若醫以傷寒治之則汗出而筋脈傷手足厥冷變生他病但服趁痛散以嘿除之趁痛散牛膝酒浸當歸官桂白朮黃耆各半兩薤白二錢半生薑半兩甘草二錢半獨活半兩上為粗末每服二錢水一盞半煎七分去滓溫服本方每服半兩水五盞煎二盞分作二次溫服透經湯方見十八問中第九十一問產後大便秘澀答曰產臥水血俱下腸胃虛弱津液不足是以大便秘澀不通也若五六日腹中悶脹者有燥糞在臟腑以其乾澀未能出耳宜服麻仁丸以津潤之若誤以為有熱而投之以寒藥則陽消陰長變動百出性命危矣此是小柴胡湯之證誤不可不謹麻仁丸三因方云去血過多臟燥大便秘澀則固當潤之大黃似難輕用候蔥涎調醋茶為丸次以蔥茶下之必通愚按此言大黃不可輕用者是麻仁研枳殼麩炒人參大黃各半兩上為細末蜜丸桐子大空心溫酒下未通加丸數服滋腸五仁丸治血氣不足大腸閉滯傳送艱難桃仁杏仁各一兩炒去皮尖柏子仁半兩松子仁一錢三字郁李仁麩炒陳皮別為末四兩上五仁別研為膏合橘皮同研煉蜜為丸桐子大每服三十丸至五十丸食前米飲下更看虛實加減第九十二問產後血崩答曰產臥傷耗經絡脈未平復勞役損動致血暴崩淋瀝不止或因鹹酸不節傷蠹營衛亦變崩中若小腹滿痛肝經已壞為難治當急服固經丸艾葉赤石脂煅補骨脂炒木賊各半兩附子一隻炮去皮臍上為末陳米糊和丸桐子大食前溫酒下三十丸米飲亦得熟乾地黃散治崩中下血不止心神煩悶頭目昏重熟地一兩半甘草蒲黃各半兩蟹爪微炒二合白茯苓伏龍肝七錢半桂心白芍當歸微炒各三錢阿膠炒黃一兩熟布燒灰三兩一本昆布上為粗末每服四錢水盞半入竹茹一分煎六分去滓溫服不拘時第九十三問產後腹脹悶滿嘔吐不定答曰敗血散於脾胃脾受之不能運化精微而致脹滿胃受之不得受納水穀不化而生嘔逆醫者不識若以尋常服止吐藥療之病與藥不相干轉更傷動正氣疾愈難治匠勝湯三因方名抵勝湯赤芍半夏泡澤蘭葉人參陳皮各一錢甘草一錢生薑半兩上為粗末每服三錢水盞半煎七分去滓熱服食前八順理中丸治新產血氣俱傷五臟暴虛肢體羸乏少氣多汗才產直百晬日每日常服壯氣補虛止嘔吐甘草人參白茯苓神麯炒各半兩乾薑炮一兩砂仁二兩麥蘖二兩白朮四兩上為末蜜丸每服三十丸食前薑湯下或加半夏曲一兩入鹽點服第九十四問產後口鼻黑氣起及鼻衄答曰陽明者經脈之海起於鼻交額中入上齒還出俠口交人中左之右右之左產後氣消血散營衛不理散亂入於諸經卻還不得故令口鼻黑氣起及變鼻衄此緣產後虛熱變生此疾其疾不可治名曰胃絕肺敗詳此一證保慶府無方可急服琥珀黑散視其病人鼻黑退衄止者活方見第八十二問中第九十五問產後喉中氣急喘答曰營者血也衛者氣也營行脈中衛行脈外相隨上下謂之營衛因產所下過多營血暴竭衛氣無主獨聚於肺中故令喘也此名孤陽絕陰難治若產後惡露不快敗血停凝上熏於肺亦令喘急如此但服奪命丹血去喘急自止奪命丹方見八十一問旋覆花湯治產後傷風或風寒暑濕咳嗽喘滿痰涎壅塞如服奪命丹喘不定可服此藥前胡麻黃杏仁五味子茯苓甘草赤芍旋覆花半夏曲人參玄及各等分上為飲子每服四錢水盞半姜五片棗一枚煎七分溫服食前第九十六問產後中風答曰產後五七日內強力下床或月內傷於房室或憂怒擾蕩沖和或灼炙傷動臟腑初眼澀口噤肌肉瞤搐以漸腰脊筋急強直者不治此乃人作非偶爾中風所得本集無方三因方評之頗詳八風湯治迷惑如醉狂言驚悸恍惚見鬼天雄當歸人參各五兩附子防風天門冬蜀椒獨活各四兩烏頭秦艽細辛白朮乾薑各三錢山茱萸五味子桔梗香白芷柴胡莽草各半兩上為末每服二錢溫酒調下日三服以身中覺如針刺者藥行也獨活散治產後中風口噤肩項強直四肢拘急獨活桂心甘草炙當歸炒一本作川芎麻黃附子炮細辛半兩防風八味每服四錢水酒各半盞煎七分拗開口灌之第九十七問產後心痛答曰心者血之主也有伏宿寒氣因產大虛寒搏於血血凝不得消散其氣逆衝擊於心之經脈故心痛但以大岩蜜湯治之寒去則血脈溫而經絡通心痛自止若誤以為所傷療之則虛極寒益甚矣心絡寒甚傳之正經則變真心痛朝發夕死夕發朝死不可輕用藥如此大岩蜜湯熟地當歸獨活吳茱萸洗官桂芍藥乾薑甘草各二兩細辛小草遠志苗也各一兩上為粗末每服五錢水三盞煎一盞去滓溫服不拘時四神散治產後留血不消積聚作塊急切疼痛及心腹痠痛下痢當歸乾薑炮川芎赤芍上為末每服三錢溫酒調下不拘時第九十八問產後熱悶氣上轉為腳氣答曰產臥血虛生熱復因春秋取涼過多地之蒸濕因足履之所著而為腳氣其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也但服小續命湯三兩劑必愈若醫者誤用逐敗血藥攻之則血去而疾增益劇小續命湯此藥不論胎前產後或入風邪虛極遍身疼痛或疾喘不定者宜服之加麝香半夏入每服水二盞候煎熟傾藥汁後另以麝入於內再煎一二沸食前服一二服神效人參黃芩官桂麻黃防己各一兩生薑五兩芎藭芍藥甘草白朮各一兩附子一隻去皮防風一兩半上為㕮咀每服三錢水二盞煎八分去滓溫服不拘時大驅風散治猝中欲死風攻身體及五臟言語謇澀神思冒昧或履濕氣變為腳氣此方尤妙麻黃二兩芎藭一兩半石膏煨一兩半肉桂白芷甘草乾薑炮當歸黃芩杏仁去皮尖炒各二分上為㕮咀每服四錢水盞半煎六分去滓不以時候稍熱服汗出為度一方入荊瀝五合同煎大驗如腳氣加白朮一兩乾木瓜一兩去乾薑第九十九問產後汗出多而變痓風答曰產後血虛內理不腠密故多汗因遇風邪搏變痓風痓者口噤不開背強而直如風發癇狀搖頭馬鳴身反折須臾十發氣息如絕宜速斡口灌之小續命湯稍緩即汗出如雨手拭不及者不可治三因方云既汗多如何更服麻黃桂等不若大局方大聖散亦良藥小續命湯方見九十八問防風湯治產後中如角弓時時反張口噤防風一兩葛根一兩芎藭生地藁本杏仁去皮尖各一兩獨活二兩甘草桂心防己蔓荊子各七錢半麻黃一兩上為㕮咀每服四錢水盞半煎六分去滓溫服不拘時第一百問產後所下過多虛極生風答曰婦人以營血為主因產血下太多氣無所主唇青肉冷汗出目瞑神昏命在須臾此但虛極生風也如此急服濟危上丹良以風藥治之則誤矣乳香五靈脂硫黃太陰玄精石研桑寄生真阿膠卷柏生陳皮各等分上將上四味同研石器內微火炒動勿令焦炒了再研極細後入余藥末用地黃汁和糊丸如桐子大溫酒下二十丸當歸酒下尤妙神授散治產後一切疼痛不論大小以致危篤者皆可服百合水浸洗乾薑炮甘草當歸川芎各二兩青皮桂心牡丹皮白芍陳皮各五兩神麯炒麥肉一本麥冬王宇泰書作麥芽人參各三兩紅花一兩半上為㕮咀每服二錢水一盞姜三片棗一枚煎七分空心去滓溫服妊婦不可服虛者去牡丹皮紅花加附子三兩
