  - {type: 'tls:div-start', offset: 5081, content: '', id: KR3ei031_jc_003-d3d12, level: 2, head_text: 第六十一問妊娠傷寒瘥後復發熱}
  - {type: 'tls:head', offset: 5081, content: '', id: KR3ei031_jc_003-d3.d12.h1s1}
  - {type: 'tls:div-end', offset: 5347, content: '', id: KR3ei031_jc_003-d3d12}
  - {type: 'tls:div-start', offset: 5347, content: '', id: KR3ei031_jc_003-d3d13, level: 2, head_text: 第六十二問時氣溫病皆能損胎}
  - {type: 'tls:head', offset: 5347, content: '', id: KR3ei031_jc_003-d3.d13.h1s1}
  - {type: 'tls:div-end', offset: 5745, content: '', id: KR3ei031_jc_003-d3d13}
  - {type: 'tls:div-start', offset: 5745, content: '', id: KR3ei031_jc_003-d3d14, level: 2, head_text: 第六十三問妊娠寒熱或因暑氣有不因傷暑而得之}
  - {type: 'tls:head', offset: 5745, content: '', id: KR3ei031_jc_003-d3.d14.h1s1}
