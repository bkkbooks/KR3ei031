  - {type: 'tls:div-start', offset: 3796, content: '', id: KR3ei031_jc_003-d3d10, level: 2, head_text: 第五十九問大小二便秘結不通}
  - {type: 'tls:head', offset: 3796, content: '', id: KR3ei031_jc_003-d3.d10.h1s1}
  - {type: 'tls:div-end', offset: 4570, content: '', id: KR3ei031_jc_003-d3d10}
  - {type: 'tls:div-start', offset: 4570, content: '', id: KR3ei031_jc_003-d3d11, level: 2, head_text: 第六十問妊娠傷寒與常人治法同異}
  - {type: 'tls:head', offset: 4570, content: '', id: KR3ei031_jc_003-d3.d11.h1s1}
