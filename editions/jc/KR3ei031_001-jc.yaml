  - {type: 'tls:div-end', offset: 13362, content: '', id: KR3ei031_jc_001-d2d36}
  - {type: 'tls:div-start', offset: 13362, content: '', id: KR3ei031_jc_001-d2d37, level: 2, head_text: 第三十六問顛狂之病何以別之}
