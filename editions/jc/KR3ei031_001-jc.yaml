  - {type: 'tls:div-start', offset: 6017, content: '', id: KR3ei031_jc_001-d2d17, level: 2, head_text: 第十六問婦人多因風冷而生諸疾}
  - {type: 'tls:head', offset: 6017, content: '', id: KR3ei031_jc_001-d2.d17.h1s1}
  - {type: 'tls:div-end', offset: 6455, content: '', id: KR3ei031_jc_001-d2d17}
  - {type: 'tls:div-start', offset: 6455, content: '', id: KR3ei031_jc_001-d2d18, level: 2, head_text: 第十七問婦人多頭眩而冒}
  - {type: 'tls:head', offset: 6455, content: '', id: KR3ei031_jc_001-d2.d18.h1s1}
  - {type: 'tls:div-end', offset: 7017, content: '', id: KR3ei031_jc_001-d2d18}
  - {type: 'tls:div-start', offset: 7017, content: '', id: KR3ei031_jc_001-d2d19, level: 2, head_text: 第十八問身體疼痛流注不定}
  - {type: 'tls:head', offset: 7017, content: '', id: KR3ei031_jc_001-d2.d19.h1s1}
  - {type: 'tls:div-end', offset: 7415, content: '', id: KR3ei031_jc_001-d2d19}
  - {type: 'tls:div-start', offset: 7415, content: '', id: KR3ei031_jc_001-d2d20, level: 2, head_text: 第十九問朝食暮吐}
  - {type: 'tls:head', offset: 7415, content: '', id: KR3ei031_jc_001-d2.d20.h1s1}
  - {type: 'tls:div-end', offset: 7712, content: '', id: KR3ei031_jc_001-d2d20}
  - {type: 'tls:div-start', offset: 7712, content: '', id: KR3ei031_jc_001-d2d21, level: 2, head_text: 第二十問婦人之病多因氣生}
  - {type: 'tls:head', offset: 7712, content: '', id: KR3ei031_jc_001-d2.d21.h1s1}
  - {type: 'tls:div-end', offset: 8130, content: '', id: KR3ei031_jc_001-d2d21}
  - {type: 'tls:div-start', offset: 8130, content: '', id: KR3ei031_jc_001-d2d22, level: 2, head_text: 第二十一問猝然而死少間復甦}
  - {type: 'tls:head', offset: 8130, content: '', id: KR3ei031_jc_001-d2.d22.h1s1}
  - {type: 'tls:div-end', offset: 8447, content: '', id: KR3ei031_jc_001-d2d22}
  - {type: 'tls:div-start', offset: 8447, content: '', id: KR3ei031_jc_001-d2d23, level: 2, head_text: 第二十二問病非瘧之邪四時多病寒熱}
  - {type: 'tls:head', offset: 8447, content: '', id: KR3ei031_jc_001-d2.d23.h1s1}
  - {type: 'tls:div-end', offset: 8743, content: '', id: KR3ei031_jc_001-d2d23}
  - {type: 'tls:div-start', offset: 8743, content: '', id: KR3ei031_jc_001-d2d24, level: 2, head_text: 第二十三問因咳嗽經候不行}
  - {type: 'tls:head', offset: 8743, content: '', id: KR3ei031_jc_001-d2.d24.h1s1}
  - {type: 'tls:div-end', offset: 9011, content: '', id: KR3ei031_jc_001-d2d24}
  - {type: 'tls:div-start', offset: 9011, content: '', id: KR3ei031_jc_001-d2d25, level: 2, head_text: 第二十四問咳嗽有紅痰}
