  - {type: 'tls:div-end', offset: 13938, content: '', id: KR3ei031_jc_001-d2d37}
  - {type: 'tls:div-start', offset: 13938, content: '', id: KR3ei031_jc_001-d2d38, level: 2, head_text: 第三十七問病有一臂痛有兩臂俱痛}
