  - {type: 'tls:div-end', offset: 9449, content: '', id: KR3ei031_jc_001-d2d25}
  - {type: 'tls:div-start', offset: 9449, content: '', id: KR3ei031_jc_001-d2d26, level: 2, head_text: 第二十五問吐血衄血齒衄舌上出血汗血}
