  - {type: 'tls:div-end', offset: 15579, content: '', id: KR3ei031_jc_001-d2d42}
  - {type: 'tls:div-start', offset: 15579, content: '', id: KR3ei031_jc_001-d2d43, level: 2, head_text: 第四十二問陰崩陽崩何以別之}
