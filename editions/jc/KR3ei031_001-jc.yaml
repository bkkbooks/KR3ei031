body:
  text: 卷上第一問精血以分男女之本源答曰男子以精為本女子以血為源男子為陽陽中必有陰陰中之數八故一八而陽精降二八而陽精溢女子為陰陰中必有陽陽中之數七故一七而陰血升二七而陰血溢陽精陰血皆飲食五味之實秀為男女之本源也方其升也智慮開明齒牙更始發黃者黑筋弱者強暨其溢也凡充身肢體手足耳目之餘雖針芥之處無有不至凡子形肖父母者蓋其精血嘗於父母之身無所不歷也是以父一肢廢則子一肢不肖其父母一目虧則子一目不肖其父母然雌雞牝獸無天癸而成胎何也鳥獸精血往來尾間也精未通而遇女子通其精則五體有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出而內敗小便道澀而為淋精已耗而復竭也女人天癸既至逾十年無男子合則不調未逾十年男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而為腫或雖合而難子合男子多則瀝枯虛人產乳眾則血枯殺人觀其精血思過半矣第二問古法男子三十而娶女子二十而嫁答曰天以剛陽為尊地以柔陰而卑則乾坤之體定矣若天不剛陽地不柔陰是乾坤之體不定矣夫乾道成男男自子位左旋積三十歲而至巳所以男及三十而娶當是之時天陽已剛也坤道成女自子位右旋積二十歲而至巳所以女二十而嫁至斯之際地陰以順也故及其時得子皆強所謂乾坤之體定矣不及其時而嫁娶者則剛陽柔陰必有所虧也第三問婦人感病倍於男子答曰夫婦人者眾陰之所集常與濕居十四以上陰氣浮溢百想經心內傷腑臟外損姿容月水去留前來交互瘀血停凝中道絕斷其中傷墮不可具論冷熱臟腑虛實交錯惡血內滿氣脈耗竭或飲食無度損傷非一或胎瘡未愈合其陰陽或行步風來便利於懸廁之上風從下入便成十二痼疾一作三痼之疾所以婦人別立其科也若是四時節氣虛實冷熱為患者故與丈夫治法同也惟妊娠而挾病者避毒藥恐或傷胎耳大抵婦人以其慈戀憎愛疾妒憂恚染著堅牢情不自制所以為病根深療之難瘥故倍於男子之病者此也第四問何以謂之天癸答曰謂壬癸北方水乾也壬為陽水配丁而化木癸為陰水合戊而化火經云水火者陰陽之證兆也且婦人者眾陰之所集以陰類陰故得水之癸干也女至二七腎氣全盛衝任流通經血漸盈應時而下天真之氣殊降與之從事故云天癸也內經云二七而癸至任脈通太衝脈盛月事以時下故有子然沖為血海任主胞胎陰靜海滿二者相資故令有子第五問何以謂之經候答曰夫女子十四天癸至腎氣全盛沖流任通血漸盈應時而下常以三旬一見愆期者病故謂之經候然經者常也候者謂候一身之陰陽也經常之氣伺候而至若潮候之應乎時也天真之氣與之流通故一月一次行平和則不失乎期所以謂之經候又名月水也第六問經候或前或後多寡不定答曰夫婦人病多是月經乍多乍少或前或後時發疼痛醫者一例呼為經病不曾說得是陰勝陽是陽勝陰所以服藥少得有效蓋陰氣盛乘陽則胞寒氣冷血不運行經所謂天寒地凍水凝成冰故令乍少而在月後若陽氣盛乘陰則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前當和其陰陽調其氣血以平為福陽氣勝陰月假多者當歸飲抑陽助陰調理經脈當歸去蘆微炒熟地淨洗酒蒸焙乾川芎白芍黃芩小半白朮各等分上為粗末每服三錢水盞半煎至八分食前熱服沉香降氣湯順氣道通氣脈烏藥沉香香附甘草砂仁各等分上為細末每服二錢空心鹽湯調下陰氣勝陽月假少者七物湯治婦人營衛氣虛經水愆期或多或少而腹痛當歸芎藭白芍莪朮川薑熟地酒蒸焙乾木香各等分上為粗末每服四錢水一盞煎八分溫服不拘時紫石英丸治婦人病多是月經乍少或在月後時發疼痛紫石英水研飛禹餘糧燒醋淬人參龍骨川烏頭泡去皮尖臍桂心不見火杜仲去皮薑製炒黑桑寄生五味子遠志去心澤瀉當歸去蘆石斛去根酒炒蓯蓉酒浸洗乾薑炮各一兩甘草炙半兩川椒去目併合口炒地上出汗牡蠣固濟火燒通紅各半兩上為細末煉蜜為丸梧桐子大空心米飲下三十丸至五六十丸以上無求子方金華散治婦人經血後熱崩漏不止口苦舌乾經候不通並宜服之玄胡索瞿麥當歸牡丹皮石膏二兩乾葛各一兩蒲黃半兩桂心威靈仙各三分凡方中雲一分者二錢五分也上為粗末每服二錢水一盞姜三片煎至六分空心服以上養生席判官方通經丸治婦人室女月候不通疼痛或成血瘕桂心不見火青皮去白大黃炮乾薑川椒炒去目莪朮川烏泡去皮尖乾漆炒去煙出當歸桃仁炒去皮尖以上各等分上為細末將四分用米醋熬成膏和餘六分末成劑臼中治之丸如桐子大陰乾每服二十丸空心食前米飲湯下加至三十丸溫酒亦得五靈脂散治經候不止拯濟方五靈脂為末炒令過熟出盡煙每服二錢當歸二片酒一中盞煎至六分去滓熱服連三服立效如血室有乾血用醋一盞煎七分和滓空心熱服溫經湯治衝任虛損月候不調或來多不斷或過期不來或崩中去血過多不止又治曾經損孕瘀血停留少腹急痛發熱下利手掌煩熱唇乾口燥及少腹有寒久不受胎丹皮阿膠碎炒當歸去蘆人參去蘆川芎甘草炒肉桂去粗皮芍藥各二兩半夏各湯洗七次二兩半吳茱萸三兩麥門冬去心五兩半上為粗末每服三錢水一盞半生薑五片煎八分去滓空心食前熱服第七問月水依時來不快利答曰婦人月水有四經之所主一者衝任二脈二者手太陽少陰二經然沖為血海任為主胞胎二者相資故令有子手太陽者小腸之經為腑而主表表屬陽手少陰者心之經為臟而主裡里屬陰此二經在上為乳汁在下為月水或勞傷氣血致令體虛而受乎風冷風冷客於經絡搏於血氣血得冷則壅滯故令月水不宜利也養榮湯治婦人血海虛弱心忪恍惚時多驚悸或發虛熱經候不調白芍川芎當歸熟地青皮薑黃川薑丹皮海桐皮五加皮白芷上為㕮咀每服五錢水盞半姜五片烏梅一個煎至一盞去滓溫服不拘時候將此藥送下紫桂圓七十粒紫桂圓方見四十九問第八問經水欲行先身體痛或腹痛答曰經脈者行血氣通陰陽以營衛周身者也血氣盛陰陽和則形體適平或外虧衛氣之充養內乏營血之灌溉血氣不足經候欲行身體先痛也或風冷之氣客於胞絡損傷衝任之脈及手太陽手太陰之經故月水將下之際血氣與風冷相擊所以經欲行而腰痛也趁痛飲子治經脈虛寒身體疼痛虎骨五銖茯苓甘草藁本防風白芷各二銖當歸白芍續斷吳術附子各三銖上為粗末每服五錢水二盞姜五片棗二枚煎至一盞去滓溫服不拘時溫經湯治風寒客搏經絡小腹作痛當歸川芎白芍官桂丹皮莪朮各半兩人參甘草牛膝各一兩上為粗末每服五錢水二盞煎八分食前服沒藥除痛散逐寒邪療腹痛蓬莪朮炮一兩當歸焙玄胡索五靈脂肉桂良薑炒蒲黃炒各七錢半甘草沒藥各半兩上為細末每服三錢溫酒調下楊氏謂婦人每經欲行必先腹痛令服撞氣阿魏丸酒調大聖散下數服愈經行不復痛矣撞氣阿魏丸大聖散見宋局方婦人門茴香炒香陳皮去白青皮去白川芎丁香皮炒蓬莪朮炮甘草縮砂仁肉桂去粗皮白芷炮各半兩生薑四兩切鹽半兩醃一宿炒黑胡椒二錢半阿魏二錢半醋浸一宿以面同為糊上末阿魏糊為丸雞豆大每藥一斤硃砂七錢為衣常服一粒嚼爛醋湯茶酒任下滋血湯治血風虛經候澀滯經脈不通四肢麻木肌體渾身疼痛倦怠將成癆瘵馬鞭草荊芥穗各四兩丹皮一兩赤芍枳殼肉桂當歸川芎各二兩上為粗末每服四錢烏梅一個水煎食前服琥珀散治月經擁滯心腹疼痛及治產後惡露不快血上搶心迷悶不省氣絕欲死京三稜煮莪朮煮赤芍藥煮劉寄奴煮牡丹皮煮官桂菊花蒲黃熟地當歸各一兩上將前五味用烏豆半升生薑半斤切片米醋四升同煮豆腐爛為度焙乾入後五味同為末每服二錢溫酒調下第九問月水閉絕不通答曰夫月水不通因風冷客於胞絡或醉後入房或為血枯血瘕血癥或因墮墜驚恐皆令月水不通也病源云血性得溫宣流得寒則澀閉既為冷所結搏則月水不得通行若腸中鳴者則月事不來不來因冷干於胃腑或醉入房者則內氣耗損勞傷於肝經或吐血唾血下血謂之脫血使血枯於中為積塊血瘕血癥名曰血聚使榮結於內心主行血墮墜驚恐神無所倚而血散亦令月水不通也順榮湯治婦人血積血塊癥症腹大內有塊形築築作痛久無寒熱大黃一兩酒浸蒸熟銼當歸一兩蓽茇半兩鬼腰帶各一兩腰帶一本作箭枳殼一兩去穰麩炒赤芍藥半兩豬牙皂角半兩火上炙者上為㕮咀每服一兩純酒二盞煎至一盞去滓食前溫服滋血湯治勞過度致傷腑臟衝任氣虛不能約制其經血忽暴下謂之崩中或下鮮血或下瘀血或下血片或下五色連日不止淋瀝不斷形氣羸劣倦怠困乏或月水閉絕氣不升降馬鞭草牛膝荊芥穗各四兩丹皮赤芍枳殼肉桂當歸川芎各二兩每服四錢烏梅一個水煎空心服至半月或一月經脈自通桃仁煎丸治血瘕血積經候不通桃仁去皮尖麵炒黃大黃濕紙裹蒸川朴硝各一兩虻蟲半兩炒黃上為末以醇醋二升半銀石器中慢火煎取一升半下大黃桃仁虻蟲等不住手攪欲團圓下朴硝更不住手攪良久出之丸如桐子大前一日不用吃晚食五更初用溫酒吞下五粒日午取下如赤豆汁雞肝蝦麻衣未下再服血鮮紅即止續以調氣血藥補之此千金方出萬病丸見六問中第十問虛勞之病何以得之答曰夫有勞役之勞有勞傷之勞役之勞所用太過臟腑之氣失其常度所以致疾虛則已有所虧勞則因有所損其積之有漸成之有日豈一朝一夕而驟致哉巢氏云五勞六極七傷謂之虛勞也今尋原指要而論之若腹脅有塊大小成形按之不動推之不移久久令人寒熱如瘧咳嗽面目浮腫動輒微喘日就羸瘦此繇暴怒驚恐氣上而不下動傷於肝氣聚而不散結而成形結久而變勞又有日頓羸瘦氣短乏力腰背牽急膝脛酸痿小便或赤或白而濁帶下不禁夢與鬼交翕翕如熱骨肉煩疼此繇房勞過度精耗氣竭得之於腎為勞尤速也柏子仁丸治婦人血閉不通漸成癆瘵柏子仁別研當歸洗熟地白茯苓丹皮卷柏白芍藥石斛巴戟去心肉蓯蓉酒浸山藥杜仲白薇蒲黃枳殼肉桂京三稜煨莪朮煨覆盆子枸杞子各一兩附子炮去皮臍半兩上為細末煉蜜丸梧桐子大每服五十丸溫酒或米飲下空心食前人參銼散去熱解勞調順經水滋養新血藥性中和退熱無大寒極冷之劑黃耆三分黃芩赤茯苓白朮熟地赤芍藥麥冬各一兩柴胡半兩人參知母當歸甘草炙各三錢五分上並生銼如麻豆大焙乾入瓷器中收每服四錢水一盞半竹葉燈心三寸長各七莖同煎七分去滓溫服不拘時候日三服如病退不必服沉香煎治暴怒驚恐氣逆上而不下動傷於肝氣聚而不散結而成形石斛五兩川椒炒去目附子炮去皮臍秦艽去土柴胡去苗沉香木香鱉甲醋煮刮去筋膜黃耆檳榔各二兩上為細末先用新枸杞十斤洗略捶碎法酒二斗煮取七升取枸杞根別用法酒三升洗拍令淨與酒一處更入蜜四兩煮成膏和前件藥末丸如桐子大米飲下三十丸食前日二服一方加柴胡二兩楊氏方婦人患脾血病時覺腹痛惡心五心煩熱如勞之狀或進或退經候行而食驚恐所致令服局方四物湯加吳茱萸同煎溫服病愈逍遙散四物湯加柴胡又正方白茯苓白朮白芍柴胡當歸甘草人參每服用煨姜一塊薄荷少許不拘時煎服膠艾湯治勞傷氣血衝任虛損月水過多淋瀝漏下連日不斷腹臍疼痛及妊娠將攝失宜胎動不安腹痛下墜勞傷胞絡胎損漏血腰痛悶亂因損動胎上搶心奔沖短氣因產衝任氣虛不能約制經血淋瀝不斷延引日久漸成羸瘦熟地白芍當歸艾葉微炒阿膠炒黃芎藭甘草炙各二兩上為㕮咀每服四錢水一盞酒六分煎八分去滓食前熱服甚者連服內補當歸丸見五十三問第十一問婦人卦數已盡經水當止而復行答曰經云男子生於寅寅為木陽也女生於申申為金陰也寅屬木陽中有陰男子得八數故八歲齒更髮長骨之餘生齒男子以氣為本八八則卦數已盡盡則陰精痿申屬金陰中有陽女子得七數七歲齒更髮長血之餘生髮女以血為主七七則卦數以終終則經水絕止內經云七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子也或勞傷過度喜怒不時經脈虛衰之餘又為邪氣攻衝所以當止而不止也茸附養真湯補衝任調血氣乾薑四兩肉桂當歸附子炮各二兩鹿茸三兩酒炙牡蠣煅二兩防風二兩龍骨二兩生上為㕮咀每服半兩水二大盞煎至八分去滓不拘時溫服補中芎藭湯治風虛冷熱勞損衝任月水不調崩中暴下產後失血過多虛羸腹痛或妊娠胎幻不安血下當歸乾薑炮各三兩川芎黃耆蜜炙茱萸湯洗七次白芍甘草炙熟地杜仲炒令絲斷人參各一兩上為㕮咀每服三錢水盞半煎一盞去滓熱服空心食前當歸散天癸已過期經脈不勻或三四月不行或一月再至問云七損七益謂女子七數盡是經候不依時者血有餘也不可止之但令依時不腰痛為善當歸川芎白芍藥各一兩白朮半兩白朮半兩山茱萸炮一兩半黃芩各銼碎炒各一兩如冷去芩加官桂上為細末每服二錢酒調下空心服一日三服第十二問何謂避年答曰王氏云有一婦人女年十五歲來診言女年十四時經水自下今經反斷其母言恐怖師曰此女為是夫人親女非耶若親者當相為說之婦人因答言是自女耳師曰所以問者無他夫人年十四亦以經水下所以女至此而斷是謂避年勿怪後當自下拱辰丹夫方當壯年而真氣猶怯此乃賦稟素弱非虛衰而然也僭燥之藥尤宜速戒勿謂手足厥逆便云陰多如斯治之不惟不能愈疾大病自此生矣滋益之方群品稍眾藥方微細難見功效但固天元一氣使水升火降則五臟自和百病自去此方主之行在孫琳郎中方葛丞相夫人少時服之極效鹿茸酥炙去皮毛四兩山茱萸新好紅者四兩當歸四兩麝香半兩別研上三件為末入麝拌和酒煮麵糊為丸如桐子大每服一百粒或五十粒溫酒或鹽湯下第十三問室女經候當行不行答曰室女者乃未出閨門之女也不以妍醜至十四五歲容貌皆紅嫩者謂之質樸未散莊子云綽約如處子者是也當此之際經脈來時俗呼為紅脈或因驚恐或冷氣擊搏所以當行而不行也通經丸治婦人室女月候不通疼痛或成血瘕嚴氏方內加玄胡索赤芍減川烏桂心不見火青皮去白大黃炮乾薑炮莪朮川烏炮去皮臍乾漆炒當歸桃仁去皮炒川椒去目炒出汗各等分上為細末將四分用米醋煮成膏和餘六分末劑臼中治之如梧桐子大陰乾每服二十丸用淡醋湯下加至三十丸溫酒亦得食前服桃仁散治婦人室女血閉不通五心煩熱紅花當歸杜牛膝桃仁別研上四味各等分為細末每服三錢溫酒調下空心食前第十四問未出閨門女有三病答曰未出閨門女即室女也一病者經水初下陰中熱或有當風或有扇風者二病者太衝脈盛氣則內熱以寒水洗之三病者或見血下驚怖若三病者有一之所受後必生帶下之疾也神仙聚寶丹治婦人血海虛寒外乘風冷搏結不散積聚成塊或成堅瘕及血氣攻注腹脅疼痛小腹急脹或時虛鳴嘔吐痰沫頭旋眼花腿膝重痛面色痿黃肢體浮腫經候欲行先若重病或多或少帶下赤白崩漏不止驚悸健忘小便頻數或下白水時發虛熱盜汗羸瘦此藥不論胎前產後室女並宜服之常服安心神去邪氣逐敗血養新血令有子亦能除諸病木香研令末琥珀別研當歸沒藥別研各一兩滴乳一分別研麝香一錢別研辰砂一錢別研上研令細和滴冷熟水搗為丸每一兩作一十五丸每服一丸溫酒磨下胎息不順腹內疼痛一切難產溫酒和童便磨下不拘時候產後血暈敗血奔心口噤舌強或惡露未盡發渴面浮煎烏梅湯和童便磨下產後氣力虛羸諸藥不效和童便磨下室女經候不調每半丸溫酒磨下第十五問婦人多驚答曰婦人者眾陰之所集而以血為之主夫心主行血脾主裹血肝主藏血因產蓐過傷或因喜怒攻損是致營血虧耗內經云血氣者人之神血既不足神亦不定所以驚怖巢氏有風驚悸候云心藏神為諸臟之主若血氣調和則心神安定若虧損則心神怯弱故風邪乘虛千之防以驚悸若久不止則變為恍惚也經濟丹治婦人血氣不足營衛俱虛心氣不定夜臥驚怖夢寐不祥心虛自汗乏力倦怠飲食減少咳嗽痰實常服補心養血安神定志令人血壯氣實極有神效白茯苓白茯神白芍藥各一兩遠志去心一兩乳香半兩別研當歸一兩酒浸酸棗仁去殼炒人參一兩沒藥一兩研硃砂別研半兩石菖蒲一兩真者只用棗仁丸亦得上十味為末煉蜜為丸桐子大將硃砂為衣每服三十丸加至五十丸棗湯參湯食前任下飲後亦可坎離丹既濟水火補心滋腎白濁夢遺辰砂一兩另研酸棗仁酒浸去殼研一兩淨附子一個去皮臍乳香半兩令隔水乳缽細研入上先用附子碾細羅末次入三味和勻煉蜜丸如雞頭大每服一粒溫酒下空心一服須是臘月合瓷器盛之石斛散治虛勞羸瘦乏力少食倦怠多驚畏石斛四錢去根淨洗銼酒炒牛膝酒浸柏子仁去皮研五味子遠志炒杏仁去皮尖炒木香肉蓯蓉酒浸焙乾訶子肉炮青橘皮柴胡人參熟地蒸各三錢白茯苓四錢甘草二錢炙乾薑一錢半炮神麯研炒麥蘖各六錢上為細末每服二錢米飲調下食前日二三服第十六問婦人多因風冷而生諸疾答曰風乃陽邪也冷乃寒氣也風隨虛入冷繇勞傷夫人將攝順理則血氣調和風寒暑濕不能為害若勞傷血氣便致虛損則風冷乘虛而干之或客於經絡則氣血凝澀不能溫養於肌膚或入於腹內則沖氣虧虛不能消化於飲食大腸虛則多利子臟寒則不生或為斷絕或為不通者隨所傷而成病皆不逃乎風冷之氣也補陰丸治婦人百疾或經不調或崩中漏不止腰腿沉重臍腹作痛潮熱往來虛煩自汗中滿氣短嘔噦不時肢體煩疼不思飲食日漸瘦弱此藥順肌體悅顏色調營衛逐風寒進飲食化痰涎熟地生地各七兩白朮五兩蒼朮五兩半泔浸一宿藁本去土牡丹皮當歸秦艽四味各十兩細辛七兩肉桂去皮八兩甘草炙六兩半蠶蛻布燒存性七兩大豆黃卷炒煙去六兩半枳殼六兩麩炒陳皮六兩去白乾薑炮羌活各五兩白芷六兩白茯苓六兩糯米三升炒黑色火煙出上件細末蜜丸每一兩作十丸每服一丸溫酒化下醋湯亦得食前丹鉛丹治一切虛寒冷病鹿茸靈砂白龍骨川椒陽起石牡蠣粉肉桂肉蓯蓉石斛川巴戟木賊澤瀉天雄酒浸炮沉香菟絲子酒浸膃肭臍各一兩磁石醋淬麝香各半兩上為細末煉蜜為丸梧桐子大每服一百丸溫酒或鹽湯下第十七問婦人多頭眩而冒答曰眩者暈也謂轉運之運世之為頭運者是也冒者冒蒙之冒世為昏冒者是也明理論曰眊非毛而見其毛眩非玄而見其玄眊謂眼花也眩謂眼黑也針經云上虛則眩下虛則厥眩雖為虛蓋風家亦有之者風主運動故也婦人頭運挾痰多嘔吐者狀若醉頭風也芎羌散治婦人患頭風者十居其半每發必掉眩如在車上蓋因血虛肝有風邪襲之耳素問云徇蒙拈尤目瞑耳聾下實上虛過在足少陽厥陰甚則入肝蓋謂此也方比他藥捷而效速川芎一兩當歸三錢羌活旋覆花細辛蔓荊子石膏生藁本荊芥穗半夏防風熟地甘草炙各半兩上為粗末每服二錢水一大盞姜五片煎至七分去滓溫服不拘時候氣虛者此藥送養正丹五七十粒玉真丸治腎氣不足氣逆上行頭痛不可忍謂之腎厥其脈舉之弦按之石堅一本作不堅硫黃二兩石膏硬者不煅研半夏湯洗七次各一兩硝石一分研上為細末研和生薑汁糊為丸如桐子大陰乾每服三十丸生薑湯米飲湯下更灸關元穴百壯良方中硫黃丸亦佳醉頭風餅兒殭蠶去絲嘴天南星上件各等分細末生薑自然汁和作餅如折二錢大厚五分陰乾每服一餅同平胃散四味者三錢重水三大盞姜五片棗二個先煎平胃散一沸次下餅子捶碎入同煎一二沸通口服桃紅散治男子婦人氣虛攻注頭目昏眩偏正頭疼夾腦風兩太陽穴疼眉稜骨痛及治風痰噁心頭運欲倒小兒傷風鼻塞痰涎咳嗽並宜服之川烏一兩草烏八錢天南星半兩以上三味水洗三次麝香腦子各一錢硃砂半兩別研細上為細末每服半錢薄荷茶調下溫酒亦得第十八問身體疼痛流注不定答曰身體疼者其證不一太陽證表未解法當身體疼痛太陽中濕一身盡痛若脈沉身體自利痛者陰也身重背強腹中絞痛咽喉不利身如被杖者陰毒證也若風邪乘虛在於皮膚之間淫淫躍躍若刺一身盡痛傷侵血氣動作如蠱毒之狀者巢氏謂之風蠱也虎骨散治婦人血風攻注身體疼痛虎脛骨一兩半桂心芎藭海桐皮當歸牛膝天麻附子骨碎補各一兩羌活半兩上為細末每服一錢空心溫酒調下透經湯治身體疼痛五積散半兩生附子二錢上件用水二盞姜七片棗二枚煎至八分去滓入麝少許再煎三四沸通口服不拘時候麝香丸治白虎歷節諸風疼痛遊走無定狀如蟲齧晝靜夜劇及一切手足不測疼痛川烏大八角者三個生全蠍二十一個生黑豆二十一粒生地龍半兩生上為細末入麝半字同研和糯米糊為丸如綠豆大每服七丸甚者十丸夜令膈空溫酒下微出冷汗一身便瘥予得此方凡是歷節及不測疼痛一二服便瘥在歙川日有一貴家婦人遍身走注疼痛至暮則發如蟲齧其肌多作鬼邪治之予曰此正歷節病也三服愈凡云一字者二分半也第十九問朝食暮吐答曰嘔吐之病皆繇三焦不調脾胃不和清濁相干之所致也大抵嘔吐本二證嘔者嘔而有聲俗所謂啘是也吐者吐而有物胃中虛冷則吐若心下牢大如杯或時寒熱朝食暮吐脈如弦緊則為虛寒相搏胃氣日虧所以不能停留水穀名曰胃反紫金丹治嘔吐心腹疼丁香木香蓽澄茄胡椒五靈脂西者肉豆蔻煨乾薑炮半夏末半兩附子炮硫黃水銀砂子二件如靈砂法炒青金頭角一兩上為細末半夏末薑汁打糊丸如桐子大每服七十丸空心米飲下姜合丸療中脘停寒胸膈結痞嘔吐噁心不思飲食木香肉桂附子硇砂紙上飛各一兩陳皮丁香沉香蓽澄茄青皮去白各一兩茴香一分炒上為細末次入硇砂研酒煮麵糊為丸每一兩作二十丸每服一丸以生薑一塊剜如盒子安藥在內濕紙裹煨令香去紙放溫細嚼鹽湯送下第二十問婦人之病多因氣生答曰氣以形載形以氣充惟氣與形兩者相待氣和則生氣戾則病結為積聚氣不舒也逆為狂厥氣不降也宜通而塞則為痛氣不達也宜消而息則為痟嬰之為癭留之為瘤亦氣之凝耳內經曰怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄勞則氣耗思則氣結驚則氣亂九氣不同故婦人之病多因氣之所生也大七氣湯治驚恐恚怒相搏而痛京三稜莪朮青橘皮淨洗陳皮藿香葉桔梗官桂益智各一兩香附子去毛二兩甘草半兩上為粗末散每服五錢水二盞姜三片棗一枚煎至一盞去滓溫服木香順氣散理衛氣順三焦烏藥木香香附子薑黃砂仁甘草上為㕮咀每服半兩水二鍾姜五片棗二枚煎至八分去滓溫服不拘時紫金丹治氣癖氣瘕蠱脹病天台陳秀山傳到不繫產方針砂十兩餘糧石硫黃各二兩上先用藥三件同好醋入鐵鍋內煮乾碾為末平胃散十兩莪朮二兩縮砂仁丁香木香獨活黃耆枳殼各一兩白茯苓大黃黃連黑牽牛甘草茱萸檳榔破故紙各三兩乾漆一兩須好者生漆二兩亦得上件為細末同前藥末用酒糊為丸桐子大每日三五服不拘數如病重則多服忌鹽醬油麵生冷等物第二十一問猝然而死少間復甦答曰世言氣中者雖不見於方書然暴喜傷陽暴怒傷陰亦氣中之源也況憂愁不意氣多厥逆往往多得此疾便覺涎潮昏塞牙關緊急若概作中風候用藥非止不相當多致殺人經云無故而喑脈不至不治自已謂氣暴逆也氣復則已故猝然而死少間復甦者正謂此也蘇合香丸療傳屍骨蒸殗殜肺痿疰忤鬼猝心痛霍亂吐利時氣鬼魅瘴瘧赤白暴利瘀血月閉痃癖下腫驚癇鬼忤中人小兒吐利乳大人狐貍等病蘇合香油一兩入安息香膏內白朮二兩丁香二兩硃砂二兩水飛研安息香二兩另為末用無灰好酒一升熬膏木香二兩白檀香二兩薰陸香另研一兩沉香二兩烏犀屑二兩蓽茇二兩香附子二兩炒訶梨勒煨去核取皮二兩麝香另研二兩龍腦研一兩上為細末研藥和用安息膏並煉白蜜和劑每服旋丸如梧桐子大早朝取井華水溫冷任意化服四丸第二十二問病非瘧之邪四時多病寒熱答曰風者陽之氣也寒者陰之邪也陰氣上升入陽中則發寒陽氣下陷入陰中則發熱陰陽偏勝寒熱互作經曰夏傷於暑秋必病瘧者是也婦人之病證見寒熱邪非暑氣者皆繇營衛之兆作也且衛者氣也氣為陽陽微則惡寒營者血也血為陰陰弱則發熱故婦人寒熱多因氣血之所使也或勞傷而體弱或經閉而寒熱若此之類久而不已則成虛損之疾也必應散治久寒熱如瘧狀熟地檳榔陳皮草果去皮當歸砂仁甘草炙柴胡以上各等分上為粗末每服三錢水二盞姜五片煎八分去滓無時溫服合藥時忌雞犬婦人見神健飲子治婦人寒熱赤芍白朮各二兩赤茯當歸肉桂鱉甲川芎枳殼柴胡黃耆秦艽桔梗橘紅甘草各一兩木香上為㕮咀每服三錢水二盞姜五片棗一枚煎至八分去滓溫服不拘時第二十三問因咳嗽經候不行答曰咳嗽之說古書有咳而無嗽後人兼言之大抵皆從肺出其聲響亮不因痰涎而發者謂之咳言其聲音聞於人痰涎上下隨聲而發者謂之嗽如水之嗽蕩能蕩其真氣也況肺主乎氣經云營氣之行常與衛氣相隨久嗽損氣則血亦不足遂致經閉不行時發寒熱久久成勞者氣血俱損之故也六神散治婦人熱勞咳嗽月水不通柴胡去苗白朮青皮去白當歸牛膝牡丹皮各一兩上為粗末每用六兩入蜜四兩炒令焦入酒並童便各一碗煎八九沸去滓分作六服空心食前紫菀丸治肺氣咳嗽紫菀防風桑白皮炙木香貝母人參款冬花葶藶隔紙炒檳榔各一兩杏仁炒天門冬去心一兩甘草上為細末蜜丸桐子大每服三十丸清米飲送下食後服第二十四問咳嗽有紅痰答曰經稱五臟六腑皆令人咳原其至理雖因寒邪之為患當分內外所傷難經云形寒飲冷則傷肺肺主皮毛自皮毛而入中者謂之形寒胃脈絡肺食寒而為嗽者謂之飲冷水飲停積於胸膈所以為痰痰中有血者乃心肺之相剋也肺屬金而主氣心屬火而行血以五臟而言之心肺皆居膈上以五行論之金火應乎相制故痰中有血者此火克乎金心勝乎肺久而不已亦變成勞難經所謂七傳者死亦此之類也褚氏遺書云喉有竅則咳血殺人腸有竅則便血羸人便血猶可止咳血不易醫所以咳嗽有紅痰者多成虛勞之疾也平肺湯定喘治嗽五味子紫菀洗去土陳皮去白甘草炙杏仁泡去皮尖半夏湯浸七次紫蘇子桑白皮上為末每服二錢水一盞姜四片煎至七分去滓溫服食後立驗丸治肺熱而咳上氣喘急不得坐臥身面浮腫不下飲食消腫下氣止嗽葶藶十分研炒為末貝母三分杏仁一兩半炒去皮尖赤茯苓紫菀五味子各三分人參一兩桑白皮一兩炙上為細末蜜丸梧桐子大每服十丸日二服甚者夜一服加至三十丸棗湯下腫盛者食後服止紅散治心肺客熱咳嗽吐血柴胡去苗一兩胡黃連宣連各半兩上為末入硃砂少許研和每服二錢水一盞煎半盞通口服第二十五問吐血衄血齒衄舌上出血汗血答曰氣屬乎陽血屬乎陰陰盛則陽虧陽盛則陰虧經所謂陽勝則陰病陰勝則陽病諸吐血衄血繇陽氣勝陰之氣被傷血失常道或從口出或從鼻出皆謂之妄行其脈洪數者逆微細者順陽明之經行絡於頤頷陽明受邪熱血從齒出也脾氣通於口心氣通於舌心脾二經被傷血故從舌出也營血內通於臟腑外縈於經絡藏則舍於肝經行則出於心臟又心之液為汗令肝心二臟俱虛血隨汗液出也內補芎歸湯治婦人血氣羸弱或崩傷過多少氣傷絕腹中拘急四肢煩熱面目無色及唾血吐血芎藭熟地各四兩白芍五兩桂心二兩甘草乾薑各三兩大棗四十枚當歸二兩上為粗末每服五錢水一盞半煎至八分去滓溫服不拘時柔脾湯治吐血下血衄血白芍黃耆甘草各一兩熟地三兩上為㕮咀每服三錢水酒各一盞煎八分去滓通口服不拘時琥珀散治小便出血琥珀豬苓去皮茯苓澤瀉滑石各一兩阿膠炒三兩車前子一兩上為粗末每服五錢水二盞煎一盞去渣溫服第二十六問婦人偏喜酸物或嗜冷答曰天食人以五氣地食人以五味者酸苦甘辛鹹是也五味各有所入酸入肝辛入肺苦入心甘入脾鹹入腎是謂五入也肝藏血婦人以血為主所以偏喜酸物食者酸入肝而養血血得其酸物所以舍藏也血虛多熱邪熱蓄於上焦煩躁內生婦人虛煩往往多嗜冷物也茯苓半夏湯治妊娠惡阻心中憒悶嘔吐噁心好啖鹹酸物旋覆花陳皮桔梗白芍人參甘草炙芎藭各半兩赤茯苓三分干熟地半夏湯洗十遍一兩一分上為粗末每服二錢水盞半姜四片煎八分去滓食前稍熱服清平湯治血虛口燥咽乾喜飲人參半夏麥門冬芍藥白朮甘草當歸茯苓柴胡各等分上㕮咀每服二錢水盞半燒生薑一塊切破薄荷少許同煎七分去滓熱服不拘時第二十七問婦人喜少怒多悲泣不止答曰婦人無故悲泣不止象如神靈或以祟祈禱終不應金匱謂之燥臟是也為所欲不稱其意大棗湯主之大棗湯治婦人臟燥甘草一兩小麥三合上㕮咀每服三錢水盞半棗五枚煎八分去渣溫服第二十八問咽中狀如梅核或如炙肉答曰有喉嚨有咽門二者各有所司喉嚨者空虛也肺之系氣之道路也肺應天故屬天氣所生有九節以通九竅之氣咽者咽也言可咽物為胃之系胃屬土地氣所生謂之嗌也或陰陽之氣痞結咽膈噎塞狀若梅核妨礙飲食久而不愈即成翻胃或胸膈痰結與氣相搏上逆咽喉之間結聚狀如炙肉之臠也四七湯治喜怒悲思憂恐驚之氣結成痰涎狀如破絮或如梅核在咽喉咯不出咽不下此七氣所為或中脘痞滿氣不舒快或痰涎壅盛上氣喘急或因痰飲節注嘔吐噁心半夏五兩茯苓四兩厚朴三兩紫蘇葉二兩上為㕮咀每服四錢水盞半姜七片棗一枚煎六分去滓熱服不拘時二氣散治陰陽痞結咽膈噎塞狀若梅核妨礙飲食久而不愈即成翻胃山梔子炒乾薑炮各一兩上為粗末每服二錢水一盞煎五分去滓熱服食遠第二十九問婦人足十指痛如油煎覆之則熱痛風吹則冷痛答曰孫真人云有腳氣之人先從腳起或先緩弱起行忽倒或兩脛腫滿或膝枯細或心中忪悸或小腹不仁或舉動轉筋或見食嘔逆惡聞食氣或胸滿氣急或遍體痠痛皆腳氣候也黃帝所謂緩氣濕痹是也頑弱名緩風疼痛為濕痹寒中三陽所患必冷暑中三陰所患必熱婦人足十指如熱油煎者此繇營衛氣虛濕毒之氣留滯經絡上攻心則心痛下攻腳則腳疼其腳指如熱油所煎亦氣之類經云熱厥是也換腿丸治一切腳氣即石楠丸石楠葉天南星炮金釵石斛萆薢牛膝酒浸一宿薏苡仁羌活不蛀者川續斷天麻銼防風去蘆當歸黃耆甘草各一兩檳榔二兩半乾木瓜四兩上為細末酒糊為丸桐子大每服五十丸漸加至一百丸溫酒或木瓜湯下空心食前萬靈散治婦人腳氣當歸赤芍烏藥青皮各一兩白朮肉桂各半兩黑牽牛二兩上為粗末每服三錢水盞半酒少許煎八分去滓溫服食前活血丹治婦人脾血久冷諸般風邪濕毒之氣留滯經絡流注腳手筋脈拳攣或發赤腫行步艱辛腰腿沉重腳心吊痛及上衝脅腹膨脹胸膈痞悶不思飲食衝心悶亂及一切痛風走注渾身疼痛川烏一兩乳香一錢半另研草烏一兩地龍一兩天南星一兩沒藥三錢半另研牛膝一兩木瓜一兩上為細末入研藥酒糊丸梧子大每服二十丸空心日午冷酒下或荊芥湯清茶亦得第三十問婦人少年發少答曰足少陽膽之經其榮在發足少陰腎之經其華在發衝任之脈為十二經之海謂之血海其脈絡上唇口若血盛則榮於頭鬢髮美若血海弱則經脈虛竭不能榮潤故發少而禿或有純赤黃者生髮藥蔓荊子青葙子蓮子草各一兩附子二字頭髮灰一匙上為末以酒漬納瓷器中封閉經二七日藥成以烏雞脂和塗之先以米泔洗髮然後敷之數月生長一尺也生眉毛七月七日烏麻陰乾為末烏麻油和塗眉即生妙滋陰養血丸治勞虛血弱肌肉枯燥手足多煩肢節痠疼鬢髮脫落面少顏色腹拘急痛引腰背去血過多崩傷內竭胸中短氣晝夜不能眠情思不樂怔忡多汗熟地當歸各一兩鹿茸二兩酥炙上為細末蜜丸桐子大每服五十丸米飲湯任下不拘時第三十一問四肢如故但腹脹答曰身腫及四肢者本起於水手足瘦削腹大者本起於脾或脹滿或散者氣也然腹脹之狀上下膨亨或鼓之有聲喘息不便繇上者不降下者不升氣痞於中無所歸息三焦渾亂若猝然脹滿余無所苦此繇脾胃不調冷氣暴折客乘於中寒之則氣收聚壅遏不通是以脹滿內經云臟寒生滿病是也若臍凸者難治大便利者為逆沉香導氣丸順氣消腫黑白牽牛各一兩炒共取末一兩青皮去白同巴豆陳皮去白同巴豆沉香檳榔半兩銼碎用巴豆五十粒去皮膜將三味炒黃色去巴豆不用全蠍炒蓽澄茄丁香胡椒各半兩續隨子一錢研蘿蔔子三兩炒甘遂半兩銼炒黃色上為細末用蔥白研如膏和丸桐子大每服二十丸炒酒酵煎湯下醋湯亦得神助丸治四肢瘦肚大三稜草果子仁川楝子各一兩醋一碗煮乾焙燥茴香蘿蔔子栗子內皮各一兩上為末醋糊丸桐子大蘿蔔湯送下五十丸虛者三十丸第三十二問病有血分有水分何以別之答曰婦人月經通流流則水血消化若風寒搏於經脈血結不通血積為水故曰血分若先病於後經水或斷名曰水分其病易治去其水經自下也若病人覺腹內脹外視如常大便黑小便赤是其證也椒仁丸治因經水斷絕後致四肢面目浮腫小便不通名曰血分水化為血血不通則為水矣五靈脂吳茱萸湯洗七次醋浸炒玄胡索各半兩芫花醋浸一宿炒焦一分椒仁甘遂炒黃續隨子郁李仁去皮研牽牛炒熟各半兩信砒一錢研石膏煅通赤研細一分附子炮熟半兩木香半兩膽礬一錢上為細末麵糊為丸如綠豆大橘皮湯下一丸臨臥未通空心加一丸腹未通日午再一服葶藶丸治因小便不利後身面浮腫致經水不通名曰水分其餘逆順並同水氣葶藶炒續隨子去皮研各半兩乾漆一兩上為末棗肉和丸桐子大煎扁竹湯下七丸如大便利者減葶藶續隨子各一分加白朮半兩第三十三問心腹痛或又有小腹痛答曰經云五臟猝痛何氣使然岐伯對曰寒氣稽留於脈外故猝然而痛也舉痛論中所載痛病共有一十七證皆繇寒氣之所致也巢氏云痛是臟虛受風冷邪氣乘心也其痛發有死者有不死成疹者心為諸臟主而藏神其正經不可傷傷之而痛者名為真心痛朝發夕死夕發朝死若腑臟虛弱風邪客於其間痛隨氣之上下或上攻於心則心痛下攻於腹則腹痛上下相攻則心腹俱痛或宿有風冷搏於血血氣停結小腹痛也醋煎散治婦人血氣腹脅刺痛及產後敗血兒枕急痛高良薑一兩當歸肉桂白芍橘紅烏藥各半兩上為細末每服三錢水醋各半盞煎七分通口服不拘時木香通氣丸治氣刺疼痛京三稜莪朮各四兩芫花木香檳榔大腹子各一兩上將米醋三斤同煮令醋盡獨去芫花炒令乾餘五味切片子焙為末白麵糊和丸如豌豆大橘皮湯下三十丸以止為度玉抱肚治停寒痼冷疾心腹刺痛常繫於臍腹間甚妙鄭主簿傳一方用針砂如上法炒訖止入硇砂半兩並不用余藥針砂一兩鐵銚內炒用柳條或小竹不住手攪煙出為度放冷白礬粉霜各二錢硇砂半兩上件白礬等三味同研為細末與針砂拌和作一服以水數點灑用匙拌擁令厚皮紙為貼闊二寸以上長四五寸貼之外以帕子系疼處或常系臍下如覺太熱即以衣襯之若藥力過再灑水如前拌用其熱如初可用四五次藥力退則將針砂再炒過別入余藥仍可用五香拈痛丸木香官桂丁香乳香藿香葉沉香各半兩斑蝥七枚巴豆三粒去油上八味為細末白麵糊丸梧桐子大每服五十丸薑湯送下第三十四問下利經水反斷答曰谷入於胃脈道乃行水入於經其血乃成胃水穀之海也腸胃虛弱為風邪冷熱之氣所乘不能腐化穀食先泄後變成利也受熱則赤虛寒則白穀氣內虧津液耗減所以下利而經水反斷也經云利止經當自下故宜先治利也大斷下丸治下利不止附子二兩細辛去蘆一兩半乾薑三兩高良薑五兩肉豆蔻訶子皮各二兩龍骨赤石脂各三兩牡蠣醋紙泥固濟火煅二兩酸石榴皮去穰醋炙黑心存性二兩白礬二兩火飛陽起石火燒赤醋淬別研三兩上為細末麵糊丸梧桐子大每服五十丸米飲空心下滲濕湯治濕勝濡泄白朮一兩半蒼朮半兩炒厚朴肉桂丁香乾薑各一兩陳皮細辛白茯苓各一兩肉豆蔻半兩砂仁二兩附子二隻八錢者同姜炒令赤去姜先炮切片上為粗末每服四錢水盞半姜五片棗二枚煎一盞食前熱服第三十五問婦人晝則明瞭暮則譫語如見鬼狀答曰此婦人因傷寒之病熱入於血室也何以明之室者屋室也謂可以停止之處人身之血室者營血停止之所經脈留會之處即衝脈也沖為血海王冰云陰靜海滿而去血內經云任脈通太衝脈盛月事以時下者是也若經水適來感其寒邪之所搏則熱入血室其證晝則明瞭暮則譫語如見鬼狀者此為熱入血室也若施治其病者當無犯胃氣及上二焦必自愈地黃湯治熱入血室生地三兩柴胡八兩人參黃芩甘草炙各二兩半夏湯炮七次二兩半上為粗末每服五錢水二盞姜五片棗一枚煎一盞去滓溫服龍齒琥珀散治產前產後血虛心神恍惚語言失度睡臥不安茯神一兩人參龍齒琥珀赤芍黃耆牛膝去蘆各三分麥門冬去心生地各一兩半當歸半兩上為粗末每服三錢水盞半煎六分去滓溫服不拘時小柴胡加地黃湯治傷寒發熱或發寒熱經水適來或適斷晝則明瞭夜則譫語如見鬼神亦治產後惡露方來忽然斷絕柴胡一兩一分人參半夏黃芩甘草生地各半兩上咀片每服五錢水二盞姜三片棗二枚煎八分去滓溫服來復丹亦名正一丹此藥配類二氣均調陰陽奪天地衝和之氣乃水火既濟之方可冷可熱可緩可急善治營衛不交養心腎不升降上實下虛氣閉痰厥心腹冷痛臟腑虛滑但有胃氣無不獲安硫黃舶上透明者一兩硝石一兩同硫黃併為細末入定鍋內微火炒用木篦子不住手攪令陰陽氣相入不可火太過恐藥力竭再研細名二氣末太陰玄精石研水飛二兩五靈脂須五臺山者水澄去砂日乾研陳皮去白青皮去白各二兩上用五靈脂二橘皮為細末次入玄精石末及前二藥末拌勻好醋打糊為丸豌豆大每服三十粒鹽湯下甚者五十粒第三十六問顛狂之病何以別之答曰入並於陰則為顛入並於陽則為狂皆繇風邪之所致也顛者猝然仆地嘔吐涎沫口喎目急手足撩戾無所覺知良久乃蘇狂者或言語不避親疏或因自高賢或棄衣逾走亦有自定之時又在有胎之時其母猝大驚亦令子氣發癇其顛有五一曰陽顛二曰陰顛三曰風顛四曰濕顛五曰勞顛此皆隨其感病之繇而命名也又有牛馬豬狗顛以其顛發之時聲形狀似於牛馬等故以為名也俗云病顛之人忌食六畜肉顛發之狀悉皆象之大聖一粒金丹治諸風驚癇大川烏頭黑附子白附子各二兩白蒺藜炒去刺五靈脂各一兩沒藥半兩別研白礬枯半兩別研白殭蠶一兩去絲炒麝香半兩淨肉細香墨半兩別研硃砂半兩別研金箔二百片為衣上將前六味同為細末後四味研細合和用井華水一盞研墨盡為度將墨汁搜和杵臼內搗五百下丸如彈子大金箔為衣陰乾每服一粒食後臨臥生薑自然汁磨化入熱酒服再以熱酒隨意多少飲之就無風暖處臥衣被蓋覆汗出即瘥病小者每粒分作二服忌發風物孕婦不可服黃牛丸治風狂喜怒不常或欲狂走白龍骨燒鐵粉研茯神人參黃連鉛霜犀角屑防風硃砂各一兩研牛黃一錢研遠志一兩去心龍腦一錢研甘草半兩炙麥門冬一兩半去心上為細末如桐子大每服二十丸熟水送下不拘時服祛邪散治顛邪惡候白礬三兩生研黃丹半兩上為研細用桑柴於瓦中燒一伏時服半錢以乳香湯下不拘時小柴胡加地黃湯方見三十五問每服五錢水二盞姜五片棗二枚煎八分去滓溫服來復丹治產後熱入血室如見鬼神狂語者方見三十五問以醋湯下十來服第三十七問病有一臂痛有兩臂俱痛答曰臂痛有數證有因寒而得之者或因伏痰者有形寒飲冷傷肺者有汗出傷阻者夫肝主諸筋肝經虛弱風寒入傷與氣血相搏筋寒則急上連兩臂俱痛宜服醒風湯理氣湯主之若或左或右痛不能舉臂者此繇伏痰在內中脘停滯脾氣不能流行止與氣搏流伏於左則左痛在右則右痛若右臂痛深連於骨如斧槌其氣自嗌已下至臍左右氣不相通徹其痛發時氣上奔急令人悶絕肌肉日消漿粥不下心中煩悶此繇形寒飲冷肺被寒結留滯於右邊若無故一臂無力痛不能舉襲襲似汗偏阻一邊肌肉時復掣痛或有不仁手不能近頭久成偏枯宜服百風湯主之百風湯治四肢垂曳骨節疼痛又名省風湯獨活三錢芎藭防風當歸桂心各二兩茯苓附子細辛天麻一兩乾蠍炒甘草一兩上為㕮咀每服三錢水一盞半姜五片煎七分去滓食前稍熱服茯苓丸治伏痰臂痛茯苓一兩半夏二兩枳殼去穰麩炒半兩風化朴硝一分上為細末薑汁煮糊為丸如桐子大每服三十丸食前薑湯下理氣湯治痰飲臂痛半夏湯洗二兩桔梗一兩官桂二兩人參一兩橘皮洗干二兩甘草半兩上為粗末每服五錢水二盞姜五片煎一盞去滓食前服第三十八問婦人渴病與三消之病同異答曰夫渴之為病一也推其受病之源所得各異指迷方論消渴之病自來有二多緣嗜欲太甚自為虛寒服五石湯丸猛烈燥藥積之在臟遂至精血枯涸又久飲酒者酒性酷熱熏蒸於臟肺是致津液耗竭渴乃生焉婦人之渴多因損血血虛則熱熱則能消飲所以多渴故與男子之病有異也柏子仁湯滋養營衛調心順氣亦治上焦虛熱煩燥口苦四肢倦怠津液內燥服之效新蘿參黃耆茯神栝蔞根天門冬去心麥門冬去心甘草各一兩北五味半兩炒柏子仁半兩熟地二兩上為粗末每服五錢水一盞半姜三片棗三枚煎七分去滓溫服不拘時辰砂聚寶丹治心肺積蘊虛熱口苦舌乾面赤大便滲泄肌肉瘦瘁四肢少力精神恍惚又治消渴消中消腎三焦留熱鐵粉三錢半牡蠣三錢半辰砂半兩栝蔞根半兩黃連二錢半金銀箔各五十片為衣知母三錢半新蘿參半兩白扁豆湯浸去皮取末半兩上件栝蔞根末等五味同前藥末用生栝蔞根去皮取汁一盞白沙蜜一小盞同銀器中煉七八沸候冷和藥為丸如梧桐子大每服三十丸煎麥門冬湯放冷送下食後一日之間三服第三十九問腰痛如折答曰腰者腎之外候足太陽經之所流注若痛連小腹不得俯仰惙惙短氣此繇腎氣虛弱勞傷過度風冷乘之有所不榮故腰痛也內經云腰者腎之腑轉搖不能腎將憊矣若妊娠腰痛者其胎必墮也杜仲散杜仲去皮杵爛酒浸一宿焙一兩官桂牡丹皮各一兩上為細末溫酒調二錢不拘時服當歸丸當歸切洗三兩水蛭炒三十枚桃仁去皮研三十粒上為細末酒煮糊丸如桐子大溫酒下十丸未愈加至三十丸腎著湯治身體重腰冷痹如坐水中狀反不渴小便自利飲食如故病屬下焦從身勞汗出衣里冷濕久而得之腰以下冷痛腰重如帶五貫錢重者甘草乾薑各二兩茯苓白朮各四兩上為粗末每服五錢水二盞去滓溫服不拘時第四十問婦人面多生黑皯與黑子答曰黑皯黑子者皆生於面上本是二證也五臟六腑之經血華充於面或痰飲漬臟或腠理受風致血氣不和或澀或渴不能榮於皮膚故變生黑皯若黑點凝聚謂之黑子若生而有之者非藥可治也洗風散治面上遊風或癮疹或風刺或黑皯茺蔚草晚蠶沙赤小豆黑牽牛白芷藁本殭蠶白附子草烏頭白蘞蔓荊子上件等分為末每一錢澡面用之第四十一問身目黃答曰黃疸之病皆屬於脾脾屬土而色黃濕勝則土氣不流瘀熱鬱發則真色見矣大抵黃疸本得之於濕濕熱相搏身必發黃若先有流熱後有濕氣者先治其熱梔子柏皮湯茵陳五苓散主之或先感其濕後加其熱者先去其濕五苓散瓜蒂散主之亦有因冷氣痞結於脾陰濕鬱而為黃先瀉其痞半夏瀉心湯枳實理中湯主之然後利其小便若病人一身面目悉黃四肢微腫胸滿不得臥汗出如黃柏汁者此繇大汗出猝入水中所致謂之黃汗宜苦酒湯若非濕熱所郁婦人面萎黃者亡血之過也宜服地黃散滋陰養血丸方見第三十問苦酒湯黃耆五兩芍藥三兩官桂三兩上為㕮咀每服五錢水盞半苦酒半盞煎一盞去滓溫服不拘時地黃散治婦人血少氣多寒面色青白地黃乾薑各一兩上為細末每服二錢溫酒調下不拘時茵陳五苓散豬苓去皮茯苓澤瀉白朮各一兩官桂去皮五錢上為細末以茵陳一分水一盞煎七分去滓調服加鹽點妙瓜蒂散瓜蒂赤小豆秫米各一兩上為細末粥飲調下半錢以吐為度柏皮湯柏皮三兩梔子二兩甘草一兩上為粗末每服五錢水二盞煎八分去渣溫服第四十二問陰崩陽崩何以別之答曰夫血氣之行外行經絡內榮腑臟皆衝任二脈之所主也倘若勞傷過度致腑臟俱傷衝任經虛不能約制其血故忽然暴下謂之崩下經云三焦絕經名曰血崩受熱而赤者謂之陽崩受冷而白者謂之陰崩其白者形如涕赤者形如絳黃者形如爛瓜青者形如藍色黑者形如衃血是謂五崩也當與第六問兼看陽崩膠艾湯治婦勞傷血氣衝任虛損月水過多淋漓漏下連夕不斷臍腹疼痛阿膠炒川芎甘草各二兩艾葉當歸各三兩白芍熟地各四兩上為飲子每服三錢水一盞煎六分去滓熱服空心食前甚者連夜並服之黃芩散治崩中下血黃芩為末每服一錢燒秤錘酒調下崩中多是止血藥此法治乘陰經所謂天暑地熱經水沸溢者也陰崩固經丸治婦人衝任虛弱月候不調來多不斷淋漓不止艾葉醋炒鹿角霜伏龍肝各等分乾薑上為末溶鹿角膠和藥乘熱丸梧桐子大食前淡醋湯下五十丸赤龍丹治崩漏不止余血作痛禹餘糧煅烏賊骨鹿茸酒炙龍骨乾薑當歸石燕子煅阿膠炒上等分為末酒醋糊丸桐子大每服五十丸溫酒下艾醋湯亦得第四十三問眠臥多汗答曰盜汗者因眠臥而身體流汗也此繇陽虛所致久不已令人羸瘦心虛不足亡津液故也診其脈虛弱細微皆盜汗脈也大建中湯治熱自腹中或從背膂漸漸蒸熱或寐而汗日漸羸瘦白芍六兩黃耆遠志當歸澤瀉各三兩龍骨人參甘草炙各二兩吳術一分上為粗末每服五錢水二盞姜三片棗一枚擘破入飴少許煎一盞食前溫服黃耆飲子治婦人血氣不足夜間虛乏有汗倦怠者黃耆五味子當歸白茯苓各半兩白芍遠志麥子一方用麥門冬人參吳術各一分甘草三銖上㕮咀每服三錢水盞半姜三片煎七分去滓溫服不拘時神驗加味理建湯治男子婦人夜多盜汗並便濁者此方昌國州方順齋傳到經驗乾薑吳術人參黃耆白芍肉桂甘草牡蠣浮麥當歸上件㕮咀每服水二盞姜五片棗一枚煎八分食前熱服渣再煎第四十四問左脅痛如刀刺不得喘息答曰肝居脅之左以藏血針經云邪在肝兩脅痛巢氏云左脅偏痛者繇經絡偏邪客於旁之故也人之經絡旋環於身左右表裡皆周遍若血氣調和不生虛實痛證或偏者邪傷之也其左脅痛如刀刺者則知其邪偏客於左也甚者不得喘息也醋煎散治婦人血氣腹脅刺痛良薑一兩當歸肉桂白芍陳皮烏藥各半兩上為細末每服三錢水醋各半盞煎七分通口服趁痛散治血氣刺痛起於一邊或左或右行環上下或在肌肉之間如錐刀所刺其氣不得息莪朮官桂各一兩檳榔半兩芫花醋炙附子各一兩細辛半兩上為飲子每服三錢水盞半煎七分去滓溫服薑棗同煎第四十五問積聚之病何以別之答曰積聚者繇陰陽不和腑臟虛弱受其風邪搏於腑臟之氣所為也積者五臟所生聚者六腑所生然陽化氣氣屬於六腑陰成形形主於五臟陽則動而不息故聚者始發無根本上下無所留止其痛無常處故謂之聚也陰則定而守住故積者始發有常處其痛不離其部上下有所終始左右有所窮處乃謂之積也積脈陰沉而伏象陰體之沉靜聚脈陽浮而動法陽性之浮高然積病有五隨其五臟相傳而生焉經云在肝則曰肥氣在心則曰伏梁在脾則曰痞氣在肺則曰息賁在腎則曰奔豚故曰積聚之病此可別也鱉甲丸治小腹中積聚大如七八寸盤面上下周旋痛不可忍鱉甲官桂各一兩半蜂房半兩川椒細辛人參苦參丹參沙參吳茱萸各十八銖䗪蟲乾薑牡丹皮附子水蛭皂角一本牛白角腮當歸赤芍甘草防葵各一兩蠐螬二十枚大黃虻蟲玄參十八銖上為細末蜜丸桐子大每服七丸溫酒下日三服加之以效為度沒藥散治婦人一切血氣臍腹撮痛血竭別研肉桂當歸蒲黃紅花木香沒藥玄胡索乾漆炒令煙出盡赤芍各等分上為細末每服二錢熱酒調下食前紫金散治婦人血氣不和血塊疼痛常服暖子宮通經絡橘紅枳殼肉桂玄胡索甘草炙各一兩紫金牛五兩一本紫金皮當歸酒浸一宿焙乾銼香附炒去毛各三兩南木香半兩生上為末婦人室女月水不調久閉羸瘦蘇木煎湯調下白雞冠花末煎酒調下亦得每服一匙常服安胎養氣臨產橫逆蔥白煎酒下血氣脹滿催生下死胎煎枳殼酒下地榆末煎酒下亦得產後血運頭旋中風口噤惡證發動虛腫豆淋酒下產後惡血不止血海衰敗赤白帶下胞漏棕櫚灰酒下綿灰亦得胎氣絞刺肋脅腹肚疼痛炒姜酒下心氣不足陳皮湯下產後敗血停積攻刺腰痛無灰酒下日午臨睡三服忌生冷淹藏毒魚第四十六問身體常瘙癢答曰身瘙癢者是體虛受風風入腠理與血氣相搏而俱往來在皮膚之間邪氣散而不能衝擊為痛也故但瘙癢也仲景云癢者名泄氣風久久成痂癩亦繇體虛受風邪之所致也胡麻散治脾肺風毒攻衝遍身皮膚瘙癢或生瘡疥或生癮疹用手搔時浸淫成瘡久而不瘥愈而復作面上遊風或如蟲行紫癜白癜頑麻等風或腎臟風攻註腳膝生瘡並宜服之胡麻三兩苦參二兩何首烏二兩洗甘草炙半兩荊芥三兩威靈仙一兩半上為細末每服二錢薄荷湯茶點食後服或酒調蜜湯點亦得服此後頻頻洗浴得出汗而立效苦參丸治心肺積熱腎臟風毒攻於皮膚時生疥癩瘙癢難忍時出黃水及大風手足爛壞眉毛脫落一切風疾並皆治之參苦四兩荊芥去梗三兩上為細末水糊丸如桐子大每服二十丸好茶吞下或荊芥湯食後第四十七問夜與鬼交答曰人有五臟臟有七神臟氣盛則神強外邪鬼魅不能幹犯若攝養失節而血氣虛衰鬼邪侵損故婦人夢中多與鬼魅交通其狀不欲見人如有對忤並獨言獨笑或時悲泣者是也其脈來遲或如鳥啄顏色不變皆邪物病也說今宮中人尼師寡婦曾夢中與鬼魅交通邪氣懷感久作癥瘕或成鬼胎往往有之茯神散治婦人風虛鬼神交通妄有所見聞語言雜亂茯神一兩半茯苓人參菖蒲各一兩赤小豆半兩上㕮咀每服三錢水一盞半煎六分去滓溫服食前治女人與鬼神交通獨言獨笑或悲或思或謳謠恍惚松脂三兩炒雄黃一兩研末上二味用虎爪攪勻丸如彈大夜內籠中燒之令女裸坐籠上彼急自蒙唯出頭耳過三熏即斷秦丞相炙法狐魅神邪及癲狂病諸般醫治不瘥者以並兩手大拇指用綠絲繩急縛之灸三壯艾著四處半在甲上半在肉上四處盡繞一處不燒其疾不愈神效不可量也小兒胎癇驚癇一依此法灸之一壯炷如小麥妊癇亦妙黃帝灸法治療神邪鬼魅及癲狂病言語不擇尊卑灸上唇裡面中央肉弦上一壯炷如小麥子大用鋼刀決斷更佳也第四十八問大小便不通答曰大腸者傳導之官變化出焉傳者傳其不潔之物也上與肺合膀胱者州都之官津液藏焉氣化則能出矣化者化其溲便之泄注也內與腎合或臟腑不和營衛不調使陰陽二氣失升降之道致大小二腸為秘結之患巢氏云熱則秘結寒則鴨溏熱搏於大腸則大便不通熱結於小腸則小便不通令大小便不通者是大小二腸受客熱所結也小腸受熱化物不出是致膀胱不能使溲也故便血尿血者皆繇熱之所使也枳杏丸治臟腑堅秘澀少杏仁一兩湯泡去皮尖別研枳殼二兩先研為末上為細末神麯為丸桐子大每服四十或五十丸食前米飲薑湯下麻仁丸治津液虧少大便結秘麻仁二兩去皮枳實四兩去白麩炒芍藥四兩大黃炮四兩厚朴二兩杏仁二兩上為末蜜丸桐子大米飲下二十丸未通加至三十丸石韋飲子治氣淋小遺澀痛石韋浸刷皮一兩瞿麥木通各一兩陳皮茯苓芍藥桑白皮人參黃芩各三分上為細末每服二錢水一盞半姜五片煎七分去滓溫服㕮咀亦得真珠丸常觀血之流行起自於心聚之於脾藏之於肝此三經者皆心血所繫之處也若三經守節則血濡養而安和苟一臟有傷則血散溢而為咎指迷方云小便赤色不痛不澀者非熱非淋繇經氣乘心心氣散溢血無所歸滲入下經故治之多用心藥宜服真珠丸真珠母三分研如粉柏子仁研當歸各一兩人參沉香半兩酸棗仁炒去皮研犀角鎊熟地酒浸洗蒸乾一兩半茯神去木龍齒各半兩上為細末蜜丸桐子大辰砂為衣每服四十丸加至五十丸金銀薄荷湯下日午臨臥時各一服第四十九問帶下三十六疾答曰帶下者繇勞傷過度損動經血致令體虛受冷風冷入於胞絡搏其血之所成也諸方說帶下三十六疾者是十二症九痛七害五傷三因謂之三十六疾也十二症者是所下之物一者如膏二者如青三者如紫四者如赤皮五者如膿痂六者如豆汁七者如葵羹八者如凝血九者如青血血似水十者如米汁十一者如月浣十二者經度不應期也九痛者一者陰中痛傷二者陰中淋痛三者小便刺痛四者寒冷痛五者月水來腹痛六者氣滿並痛七者汗出陰中如蟲齧痛八者脅下皮膚痛九者腰痛七害者一者害食二者害冷三者害氣四者害勞五者害房六者害妊七者害睡五傷者一者腹吼痛二者陰中寒熱痛三者小便急牢痛四者藏不仁五者子門不正引背痛三因因字一本或作固一者月水閉塞不通其餘二固者文闕不載三因方論云三固者形羸不生肌肉斷緒不產經水閉塞名品雖殊無非血病多因經絡失於調理產蓐不善調護內作七情外感六淫陰陽勞逸飲生冷遂致營衛不和新陳相干隨經敗濁淋露凝為癥瘕流溢穢惡痛害傷痼犯時微若秋毫作病重如山嶽古人所謂婦人病比男子十倍難治而張仲景所說三十六種疾皆繇子臟冷熱勞損而夾帶起於陰內也條目混混與諸方不同但仲景義最玄深非愚淺者能解恐其文雖異而義同也養氣活血丹治勞傷衝任帶下異色大艾葉炒焦取細末五兩乾薑炮細末二兩上二件用好醋二升半無灰好酒二升生薑自然汁一升艾葉末同調於銀器內慢火熬成膏方入後藥末附子白芍白朮椒紅各三兩半川芎當歸人參五味子紫巴戟去心糯米炒各二兩上為細末入前藥膏子並炒熟白麵三兩半同和勻為劑入杵臼內搗千下丸如桐子大每服五十丸溫酒或米飲食前任下紫桂丸補益血海治衝任氣虛經脈不調或多或少腰疼腹冷帶下崩漏禹餘糧火煅醋淬七次三兩龍骨艾葉醋炒牡蠣赤石脂地榆各二兩厚朴牡丹皮阿膠蛤粉炒當歸白芷吳茱萸湯洗七次肉桂各一兩附子半兩上為細末麵糊丸桐子大每服三十丸濃煎艾醋湯空心下常服第五十問婦人有帶下或淋漓不斷何以別之答曰產戶有三門一曰胞門二曰龍門三曰玉門衝任二脈行於中已產者屬胞門未產者屬龍門未嫁者屬玉門病源云陰陽過度勞傷經絡故風冷乘虛而入胞門損衝任之經傷太陽少陰之氣致令胞絡之間穢液與血相稱兼帶而下冷則多白熱則多赤久而則為淋瀝之病也大補益當歸丸治婦人諸虛不足當歸續斷乾薑阿膠甘草川芎各一兩吳術吳茱萸附子白芷芍藥官桂地黃各一兩半上為細末麵糊丸如桐子大每服五十丸溫酒或鹽湯下食前
