  - {type: 'tls:div-end', offset: 17144, content: '', id: KR3ei031_jc_001-d2d46}
  - {type: 'tls:div-start', offset: 17144, content: '', id: KR3ei031_jc_001-d2d47, level: 2, head_text: 第四十六問身體常瘙癢}
  - {type: 'tls:head', offset: 17144, content: '', id: KR3ei031_jc_001-d2.d47.h1s1}
  - {type: 'tls:div-end', offset: 17443, content: '', id: KR3ei031_jc_001-d2d47}
  - {type: 'tls:div-start', offset: 17443, content: '', id: KR3ei031_jc_001-d2d48, level: 2, head_text: 第四十七問夜與鬼交}
  - {type: 'tls:head', offset: 17443, content: '', id: KR3ei031_jc_001-d2.d48.h1s1}
  - {type: 'tls:div-end', offset: 17837, content: '', id: KR3ei031_jc_001-d2d48}
  - {type: 'tls:div-start', offset: 17837, content: '', id: KR3ei031_jc_001-d2d49, level: 2, head_text: 第四十八問大小便不通}
  - {type: 'tls:head', offset: 17837, content: '', id: KR3ei031_jc_001-d2.d49.h1s1}
  - {type: 'tls:div-end', offset: 18390, content: '', id: KR3ei031_jc_001-d2d49}
  - {type: 'tls:div-start', offset: 18390, content: '', id: KR3ei031_jc_001-d2d50, level: 2, head_text: 第四十九問帶下三十六疾}
  - {type: 'tls:head', offset: 18390, content: '', id: KR3ei031_jc_001-d2.d50.h1s1}
  - {type: 'tls:div-end', offset: 19123, content: '', id: KR3ei031_jc_001-d2d50}
  - {type: 'tls:div-start', offset: 19123, content: '', id: KR3ei031_jc_001-d2d51, level: 2, head_text: 第五十問婦人有帶下或淋漓不斷何以別之}
