  - {type: 'tls:div-start', offset: 15971, content: '', id: KR3ei031_jc_001-d2d44, level: 2, head_text: 第四十三問眠臥多汗}
  - {type: 'tls:head', offset: 15971, content: '', id: KR3ei031_jc_001-d2.d44.h1s1}
  - {type: 'tls:div-end', offset: 16268, content: '', id: KR3ei031_jc_001-d2d44}
  - {type: 'tls:div-start', offset: 16268, content: '', id: KR3ei031_jc_001-d2d45, level: 2, head_text: 第四十四問左脅痛如刀刺不得喘息}
