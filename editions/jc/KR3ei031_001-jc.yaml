  - {type: 'tls:div-end', offset: 9814, content: '', id: KR3ei031_jc_001-d2d26}
  - {type: 'tls:div-start', offset: 9814, content: '', id: KR3ei031_jc_001-d2d27, level: 2, head_text: 第二十六問婦人偏喜酸物或嗜冷}
