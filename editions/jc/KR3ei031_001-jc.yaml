  - {type: 'tls:div-end', offset: 11570, content: '', id: KR3ei031_jc_001-d2d32}
  - {type: 'tls:div-start', offset: 11570, content: '', id: KR3ei031_jc_001-d2d33, level: 2, head_text: 第三十二問病有血分有水分何以別之}
