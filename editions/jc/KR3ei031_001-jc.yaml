  - {type: 'tls:div-end', offset: 10177, content: '', id: KR3ei031_jc_001-d2d28}
  - {type: 'tls:div-start', offset: 10177, content: '', id: KR3ei031_jc_001-d2d29, level: 2, head_text: 第二十八問咽中狀如梅核或如炙肉}
