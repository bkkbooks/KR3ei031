  - {type: 'tls:div-end', offset: 12756, content: '', id: KR3ei031_jc_001-d2d35}
  - {type: 'tls:div-start', offset: 12756, content: '', id: KR3ei031_jc_001-d2d36, level: 2, head_text: 第三十五問婦人晝則明瞭暮則譫語如見鬼狀}
