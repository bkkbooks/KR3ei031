  - {type: 'tls:div-end', offset: 10084, content: '', id: KR3ei031_jc_001-d2d27}
  - {type: 'tls:div-start', offset: 10084, content: '', id: KR3ei031_jc_001-d2d28, level: 2, head_text: 第二十七問婦人喜少怒多悲泣不止}
